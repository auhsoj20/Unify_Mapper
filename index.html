<!DOCTYPE html>
<html lang="de" class="antialiased text-nexus-base bg-nexus-surface">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniFi Setup Planner</title>

  <!-- Typography -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet">
  
  <!-- Tailwind V3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            nexus: {
              surface: 'var(--color-surface)',
              surfaceCard: 'var(--color-surface-card)',
              primary: 'var(--color-primary)',
              primaryHover: 'var(--color-primary-hover)',
              base: 'var(--color-text)',
              muted: 'var(--color-text-muted)',
              border: 'var(--color-border)',
            }
          },
          fontFamily: {
            sans: ['Satoshi', 'sans-serif'],
            display: ['Cabinet Grotesk', 'sans-serif'],
          },
          boxShadow: {
            'nexus-card': '0 4px 12px 0 rgba(0, 0, 0, 0.05)',
            'nexus-float': '0 8px 30px rgba(0, 0, 0, 0.12)'
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="unifi-products.js"></script>

  <style>
    :root {
      --fs-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --fs-lg: clamp(1.125rem, 1.05rem + 0.38vw, 1.3125rem);
      --fs-xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.625rem);
      --fs-2xl: clamp(1.5rem, 1.25rem + 1.25vw, 2.125rem);
      --fs-3xl: clamp(1.875rem, 1.5rem + 1.88vw, 2.8125rem);
      
      --color-surface: #f7f6f2; 
      --color-surface-card: #ffffff;
      --color-primary: #01696f; 
      --color-primary-hover: #015256;
      --color-text: #1a1a1a;
      --color-text-muted: #5c5c5c;
      --color-border: color-mix(in oklch, currentColor 12%, transparent);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-surface: #171614; 
        --color-surface-card: #201e1c;
        --color-primary: #4f98a3; 
        --color-primary-hover: #5ab1bd;
        --color-text: #eaeaea;
        --color-text-muted: #a1a1a1;
        --color-border: color-mix(in oklch, white 12%, transparent);
      }
    }

    body { font-size: var(--fs-base); }
    h1, .h1 { font-family: 'Cabinet Grotesk', sans-serif; font-size: var(--fs-3xl); line-height: 1.1; font-weight: 800; }
    h2, .h2 { font-family: 'Cabinet Grotesk', sans-serif; font-size: var(--fs-2xl); line-height: 1.15; font-weight: 700; }
    h3, .h3 { font-family: 'Cabinet Grotesk', sans-serif; font-size: var(--fs-xl); line-height: 1.2; font-weight: 700; }
    
    .card {
      background: var(--color-surface-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), 0 4px 12px 0 rgba(0, 0, 0, 0.05);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    
    .card-hover:hover {
      box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), 0 8px 30px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .btn-primary { background: var(--color-primary); color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500; transition: background 0.2s ease; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: transparent; color: var(--color-text); border: 1px solid var(--color-border); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 500; transition: background 0.2s ease; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-secondary:hover { background: var(--color-border); }

    @media print {
      body { background: white !important; }
      #header, .no-print { display: none !important; }
      .card { border: 1px solid #ccc; box-shadow: none !important; }
      #dash-content { display: block !important; }
    }

    .step-node { width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.875rem; background: var(--color-surface-card); border: 2px solid var(--color-border); color: var(--color-text-muted); transition: all 0.3s ease; }
    .step-node.active { border-color: var(--color-primary); background: var(--color-primary); color: #fff; }
    .step-node.completed { border-color: var(--color-primary); color: var(--color-primary); }
    .step-line { flex: 1; height: 2px; background: var(--color-border); margin: 0 0.5rem; transition: background 0.3s ease; }
    .step-line.active { background: var(--color-primary); }

    #planner-area {
      background-image: radial-gradient(var(--color-border) 1px, transparent 1px);
      background-size: 20px 20px;
      background-position: -10px -10px;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    
    .draggable-ap {
      position: absolute; width: 24px; height: 24px; background: var(--color-primary); border-radius: 50%; cursor: grab; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 2px 8px rgba(1, 105, 111, 0.4); z-index: 10;
    }
    .ap-coverage {
      position: absolute; border-radius: 50%; border: 1px dashed var(--color-primary); background: color-mix(in oklch, var(--color-primary) 10%, transparent); transform: translate(-50%, -50%); pointer-events: none;
    }
    .room-box {
      border: 2px solid var(--color-border); background: color-mix(in oklch, var(--color-surface) 50%, transparent); position: absolute; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 500; color: var(--color-text-muted); cursor: pointer;
    }

    .switch-port {
      width: 24px; height: 24px; border: 1px solid var(--color-border); border-radius: 2px; background: color-mix(in oklch, var(--color-surface) 80%, transparent); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative;
    }
    .switch-port.in-use { background: color-mix(in oklch, var(--color-primary) 20%, transparent); border-color: var(--color-primary); }
    .switch-port.in-use::after { content: ""; position: absolute; bottom: -6px; width: 4px; height: 4px; border-radius: 50%; background: #10b981; }

    .toggle-checkbox:checked { right: 0; border-color: var(--color-primary); }
    .toggle-checkbox:checked + .toggle-label { background-color: var(--color-primary); }

    /* Freshness Badge */
    .data-badge { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; background: var(--color-surface); padding: 0.25rem 0.75rem; border-radius: 99px; border: 1px solid var(--color-border); }
    .data-badge button { color: var(--color-primary); font-weight: bold; cursor: pointer; }
    .data-badge button:hover { text-decoration: underline; }
    
    /* Loading Skeleton Overlay */
    #loader-overlay { position: absolute; inset: 0; background: var(--color-surfaceCard); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.5s; }

    /* AP Extra Items */
    .ap-extra-item, .cam-extra-item { animation: fadeSlideIn 0.2s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    #btn-ap-toggle, #btn-cam-toggle { cursor: pointer; }

    /* --- Rack View Overlay --- */
    .rack-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: color-mix(in oklch, var(--color-surface) 98%, transparent);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rack-overlay.hidden { display: none; }
    .rack-overlay-header {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: var(--color-surface-card);
      border-bottom: 1px solid var(--color-border);
    }
    .rack-overlay-header .rack-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: var(--fs-xl); margin-right: auto; display: flex; align-items: center; gap: 0.5rem; }
    .rack-overlay-body {
      flex: 1; display: grid;
      grid-template-columns: 380px 1fr 360px;
      gap: 0; overflow: hidden;
    }
    .rack-overlay-body.faq-collapsed { grid-template-columns: 380px 1fr 44px; }
    .rack-col { overflow-y: auto; padding: 1rem; border-right: 1px solid var(--color-border); }
    .rack-col:last-child { border-right: none; }
    .rack-col h3 { font-size: var(--fs-lg); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    @media (max-width: 1024px) {
      .rack-overlay-body { grid-template-columns: 1fr; overflow-y: auto; }
      .rack-col { max-height: none; border-right: none; border-bottom: 1px solid var(--color-border); }
    }

    /* Rack Frame (left col) */
    .rack-frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .rack-frame {
      --rack-u-height: 26px;
      position: relative;
      width: 300px;
      background: #1a1916;
      border: 6px solid #2a2825;
      border-radius: 8px;
      padding: 6px 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35), inset 0 0 0 1px #3a3835;
    }
    @media (prefers-color-scheme: dark) {
      .rack-frame { background: #0d0c0b; border-color: #1a1918; }
    }
    .rack-slot-track { position: relative; }
    .rack-slot {
      height: var(--rack-u-height);
      border-bottom: 1px dashed rgba(255,255,255,0.06);
      position: relative;
      display: flex; align-items: center;
    }
    .rack-slot:last-child { border-bottom: none; }
    .rack-slot.even { background: rgba(255,255,255,0.02); }
    .rack-slot.hover-drop { background: rgba(1, 105, 111, 0.25); }
    .rack-slot.hover-drop-invalid { background: rgba(220, 38, 38, 0.25); }
    .rack-he-label {
      position: absolute; left: -28px; top: 0;
      height: var(--rack-u-height);
      width: 22px;
      display: flex; align-items: center; justify-content: flex-end;
      font-size: 10px; color: var(--color-text-muted);
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .rack-item {
      position: absolute; left: 4px; right: 4px;
      background: linear-gradient(180deg, #3a3835 0%, #2a2825 100%);
      border: 1px solid #4a4845;
      border-left: 4px solid var(--color-primary);
      border-radius: 3px;
      color: #f0ece6;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      cursor: grab;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.3);
      user-select: none;
    }
    .rack-item:hover { filter: brightness(1.1); }
    .rack-item.dragging { opacity: 0.35; cursor: grabbing; pointer-events: none; }
    .rack-item.swap-target { outline: 2px solid #f59e0b; outline-offset: -2px; }
    .rack-item[data-kind="gateway"]    { border-left-color: #a855f7; }
    .rack-item[data-kind="switch"]     { border-left-color: #3b82f6; }
    .rack-item[data-kind="nvr"]        { border-left-color: #10b981; }
    .rack-item[data-kind="patchpanel"] { border-left-color: #9ca3af; }
    .rack-item[data-kind="pdu"]        { border-left-color: #f97316; }
    .rack-item[data-kind="ups"]        { border-left-color: #eab308; }
    .rack-item[data-kind="cableTray"]  { border-left-color: #64748b; }
    .rack-item[data-kind="blank"]      { border-left-color: #374151; background: repeating-linear-gradient(45deg, #2a2825, #2a2825 4px, #1f1d1b 4px, #1f1d1b 8px); }
    .rack-item[data-kind="shelf"]      { border-left-color: #78716c; }
    .rack-item .ri-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rack-item .ri-badge { font-size: 9px; padding: 1px 4px; border-radius: 2px; background: rgba(255,255,255,0.1); }
    .rack-item .ri-remove { color: rgba(255,255,255,0.5); cursor: pointer; padding: 0 2px; }
    .rack-item .ri-remove:hover { color: #ff6b6b; }

    /* Palette (middle col) */
    .rack-palette-card {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--color-surface-card);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      cursor: grab;
      font-size: 0.875rem;
      transition: box-shadow 0.15s ease;
    }
    .rack-palette-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .rack-palette-card.disabled { opacity: 0.5; cursor: not-allowed; }
    .rack-palette-card .pc-u { font-size: 10px; padding: 2px 6px; background: var(--color-surface); border-radius: 4px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .rack-palette-card .pc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rack-palette-card .pc-remove { font-size: 11px; opacity: 0.5; cursor: pointer; padding: 0 4px; border-radius: 4px; }
    .rack-palette-card .pc-remove:hover { opacity: 1; background: color-mix(in oklch, #ef4444 20%, transparent); color: #ef4444; }

    .rack-banner { padding: 0.75rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 0.75rem; display: flex; gap: 0.5rem; align-items: flex-start; }
    .rack-banner.warn { background: color-mix(in oklch, #f59e0b 15%, transparent); border: 1px solid #f59e0b; color: #92400e; }
    .rack-banner.info { background: color-mix(in oklch, var(--color-primary) 10%, transparent); border: 1px solid var(--color-primary); }
    .rack-banner.err  { background: color-mix(in oklch, #dc2626 15%, transparent); border: 1px solid #dc2626; color: #991b1b; }
    @media (prefers-color-scheme: dark) {
      .rack-banner.warn { color: #fcd34d; }
      .rack-banner.err  { color: #fca5a5; }
    }

    /* Cabling */
    .rack-cabling-table { width: 100%; font-size: 0.8125rem; border-collapse: collapse; }
    .rack-cabling-table th { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--color-border); color: var(--color-text-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .rack-cabling-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    .rack-cabling-table tr.orphan td { background: color-mix(in oklch, #dc2626 10%, transparent); }
    .rack-cabling-table select, .rack-cabling-table input {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 4px; padding: 2px 6px; font-size: 0.8125rem; width: 100%;
    }
    .rack-cabling-table input[type="number"] { width: 70px; }

    /* FAQ (right col) */
    .rack-faq-panel { padding: 1rem; overflow-y: auto; }
    .rack-faq-panel.collapsed { padding: 0.5rem 0.25rem; overflow: hidden; }
    .rack-faq-panel.collapsed .rack-faq-list, .rack-faq-panel.collapsed .rack-faq-head > *:not(.faq-toggle) { display: none; }
    .rack-faq-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .rack-faq-head h3 { flex: 1; margin: 0; }
    .faq-toggle { cursor: pointer; padding: 4px; border-radius: 4px; color: var(--color-text-muted); }
    .faq-toggle:hover { background: var(--color-border); }
    .rack-faq-item { border-bottom: 1px solid var(--color-border); }
    .rack-faq-q {
      cursor: pointer; padding: 0.6rem 0.25rem;
      font-weight: 600; font-size: 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
      transition: color 0.15s ease;
    }
    .rack-faq-q:hover { color: var(--color-primary); }
    .rack-faq-q .chev { transition: transform 0.2s ease; font-size: 0.75rem; color: var(--color-text-muted); }
    .rack-faq-item.open .rack-faq-q .chev { transform: rotate(90deg); }
    .rack-faq-a {
      display: none;
      padding: 0 0.25rem 0.75rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      line-height: 1.55;
    }
    .rack-faq-item.open .rack-faq-a { display: block; }
    .rack-faq-a strong { color: var(--color-text); }
    .rack-faq-a code { font-family: ui-monospace, Menlo, Consolas, monospace; background: var(--color-surface); padding: 1px 4px; border-radius: 3px; font-size: 0.8em; }
    .rack-faq-a ul { margin: 0.35rem 0 0.35rem 1rem; list-style: disc; }

    /* Toast */
    .rack-toast {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: var(--color-text); color: var(--color-surface);
      padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.875rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 60;
      animation: fadeSlideIn 0.2s ease;
    }

    @media print { #rack-overlay { display: none !important; } }
  </style>
</head>
<body class="min-h-screen text-nexus-base">

  <header id="header" class="sticky top-0 z-40 bg-nexus-surfaceCard border-b border-nexus-border backdrop-blur-md bg-opacity-80">
    <div class="max-w-6xl mx-auto px-4 md:px-8 py-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="text-nexus-primary">
          <path d="M5 8V14C5 17.866 8.13401 21 12 21C15.866 21 19 17.866 19 14V8H15V14C15 15.6569 13.6569 17 12 17C10.3431 17 9 15.6569 9 14V8H5Z" fill="currentColor"/>
          <circle cx="12" cy="4" r="2" fill="currentColor"/>
        </svg>
        <span class="font-display font-bold text-xl tracking-tight">Setup Planner</span>
      </div>
      <div id="freshness-container" class="no-print"></div>
      <button id="btn-rack-view" onclick="window.openRackView()" class="btn-secondary no-print text-xs" style="display:none; padding: 0.4rem 0.8rem;" title="Rack-Ansicht öffnen – Geräte im Rack anordnen und verkabeln">
        <i data-lucide="server" class="w-4 h-4"></i> Rack-Ansicht
      </button>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 mt-8 mb-8 no-print" id="progress-container" style="display:none;">
    <div class="flex items-center justify-between max-w-2xl mx-auto">
      <div class="step-node active" data-step="1">1</div>
      <div class="step-line" id="line-1"></div>
      <div class="step-node" data-step="2">2</div>
      <div class="step-line" id="line-2"></div>
      <div class="step-node" data-step="3">3</div>
      <div class="step-line" id="line-3"></div>
      <div class="step-node" data-step="4">4</div>
      <div class="step-line" id="line-4"></div>
      <div class="step-node" data-step="5">5</div>
      <div class="step-line" id="line-5"></div>
      <div class="step-node" data-step="6">6</div>

    <div class="flex items-center justify-between max-w-2xl mx-auto mt-2 text-xs md:text-sm text-nexus-muted font-medium text-center">

      <div class="w-16">Räume & APs</div>

      <div class="w-16">Features</div>

  <main class="max-w-4xl mx-auto px-4 pb-24 relative min-h-[500px]" id="app-content">

       <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-nexus-primary mb-4"></i>

       <p class="text-sm text-nexus-muted mt-2">Frage techspecs.ui.com ab</p>
    </div>
  </main>

  <div id="footer-nav" class="fixed bottom-0 left-0 right-0 bg-nexus-surfaceCard border-t border-nexus-border py-4 px-4 z-40 no-print" style="display:none;">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <button id="btn-prev" class="btn-secondary hidden"><i data-lucide="arrow-left" class="w-4 h-4"></i> Zurück</button>
      <div class="flex-1"></div>
      <button id="btn-next" class="btn-primary">Weiter <i data-lucide="arrow-right" class="w-4 h-4"></i></button>
    </div>
  </div>

  <div id="rack-overlay" class="rack-overlay hidden no-print"></div>

  <script type="module">
    // --- Data Definitions (ISPs & Fallbacks) --- //
    const ispList = [
      { id: 'telekom_dsl', name: 'Deutsche Telekom', type: 'DSL (VDSL/ADSL)', notes: 'PPPoE, externes Modem erforderlich.', modemRec: 'DrayTek Vigor167', modemPrice: 89 },
      { id: 'telekom_fiber', name: 'Deutsche Telekom', type: 'Glasfaser (FTTH)', notes: 'Telekom Glasfaser Modem 2 (ONT) verwenden.', modemRec: 'Telekom Glasfaser Modem 2', modemPrice: 49 },
      { id: 'vodafone_cable', name: 'Vodafone', type: 'Kabel (Coax)', notes: 'Bridge-Mode im Vodafone-Portal aktivieren!', modemRec: 'Vodafone Station (Bridge Mode)', modemPrice: 0 },
      { id: 'vodafone_dsl', name: 'Vodafone', type: 'DSL (VDSL/ADSL)', notes: 'PPPoE, externes Modem erforderlich.', modemRec: 'DrayTek Vigor167', modemPrice: 89 },

        mode: 'failover'         // 'failover' | 'loadbalance'
      },
      bomOverrides: {
        removedKeys: [],         // ['auto:Zubehör:acc-rack-6u', ...]
        customRows: [],          // [{id, category, name, qty, price}]
        quantityOverrides: {}    // { 'auto:Access Point:u7-pro': 3 }
      },
      poeAssignments: {},        // { [ap.id|cam.id]: 'switch' | 'gateway' }
      racks: [],                 // [{id,name,heightU,depthMm,items:[{id,slug,kind,uStart,uSize,label,ports}]}]
      cabling: {
        connections: [],         // [{id,deviceKind,deviceId,rackItemId,portNumber,cableLengthM,cableCategory,autoRouted}]
        defaultCategory: 'cat6a',
        defaultLengthPerFloorM: 15
      },
      rackView: { faqCollapsed: false, activeRackId: 'r-main', customPalette: [] },
      rackViewOpen: false        // ephemer; beim Boot immer false
    };

    // Backup-State Defaults + Migration alter Schema-Versionen.
    function normalizeBackupState(bu) {
      const def = { enabled: false, type: null, cellularModel: null, starlinkAntenna: null, starlinkPlan: null, isp2: null, speedDown2: 100, speedUp2: 40, mode: 'failover' };
      if(!bu || typeof bu !== 'object') return def;
      // Migration: alte Variante `type: 'udr5g'` → Mobilfunk + cellularModel: 'udr-5g-max'
      if(bu.type === 'udr5g') {
        bu.type = 'cellular';
        bu.cellularModel = bu.cellularModel || 'udr-5g-max';
      }
      // Migration: alte cellularModel-Slugs auf aktuelle techspecs-Slugs mappen
      const CELL_MIGRATION = {
        'umr':                 'umr-us',
        'u-lte-pro':           'u-lte-backup-pro',
        'u-5g-outdoor':        'u5g-max-outdoor',
        'u-lte-outdoor':       'umr-industrial-us',
        'udr-5g-max-outdoor':  'u5g-max-outdoor'
      };
      if(bu.cellularModel && CELL_MIGRATION[bu.cellularModel]) {
        bu.cellularModel = CELL_MIGRATION[bu.cellularModel];
      }
      return { ...def, ...bu };
    }

    function normalizeBomOverrides(ov) {
      const def = { removedKeys: [], customRows: [], quantityOverrides: {} };
      if(!ov || typeof ov !== 'object') return def;
      return {
        removedKeys: Array.isArray(ov.removedKeys) ? ov.removedKeys : [],
        customRows: Array.isArray(ov.customRows) ? ov.customRows : [],
        quantityOverrides: (ov.quantityOverrides && typeof ov.quantityOverrides === 'object') ? ov.quantityOverrides : {}
      };
    }

    // Rack-State: Defaults + Säuberung ungültiger Items.
    function normalizeRacksState(racks) {
      if(!Array.isArray(racks) || racks.length === 0) return [];
      return racks.map(r => {
        const heightU = Math.max(1, Math.min(48, parseInt(r?.heightU) || 12));
        const items = Array.isArray(r?.items) ? r.items.filter(it => {
          if(!it || typeof it !== 'object') return false;
          const uStart = parseInt(it.uStart);
          const uSize = parseInt(it.uSize);
          if(!Number.isFinite(uStart) || !Number.isFinite(uSize)) return false;
          if(uStart < 1 || uSize < 1) return false;
          if(uStart + uSize - 1 > heightU) return false;
          return true;
        }).map(it => ({
          id: it.id || ('ri-' + Math.random().toString(36).slice(2,9)),
          slug: it.slug || null,
          kind: it.kind || 'custom',
          uStart: parseInt(it.uStart),
          uSize: parseInt(it.uSize),
          label: it.label || null,
          ports: Number.isFinite(parseInt(it.ports)) ? parseInt(it.ports) : null
        })) : [];
        return {
          id: r.id || ('r-' + Math.random().toString(36).slice(2,7)),
          name: r.name || 'Rack',
          heightU,
          depthMm: parseInt(r.depthMm) || 450,
          items
        };
      });
    }
    function normalizeCablingState(c) {
      const def = { connections: [], defaultCategory: 'cat6a', defaultLengthPerFloorM: 15 };
      if(!c || typeof c !== 'object') return def;
      return {
        connections: Array.isArray(c.connections) ? c.connections.filter(cn => cn && cn.deviceId && cn.rackItemId).map(cn => ({
          id: cn.id || ('cn-' + Math.random().toString(36).slice(2,9)),
          deviceKind: cn.deviceKind === 'camera' ? 'camera' : 'ap',
          deviceId: String(cn.deviceId),
          rackItemId: String(cn.rackItemId),
          portNumber: Number.isFinite(parseInt(cn.portNumber)) ? parseInt(cn.portNumber) : null,
          cableLengthM: Number.isFinite(parseFloat(cn.cableLengthM)) ? parseFloat(cn.cableLengthM) : 15,
          cableCategory: cn.cableCategory || 'cat6a',
          autoRouted: cn.autoRouted !== false
        })) : [],
        defaultCategory: c.defaultCategory || 'cat6a',
        defaultLengthPerFloorM: Number.isFinite(parseFloat(c.defaultLengthPerFloorM)) ? parseFloat(c.defaultLengthPerFloorM) : 15
      };
    }
    function normalizeRackView(rv, racks) {
      const firstId = racks?.[0]?.id || 'r-main';
      const def = { faqCollapsed: false, activeRackId: firstId, customPalette: [] };
      if(!rv || typeof rv !== 'object') return def;
      const customPalette = Array.isArray(rv.customPalette)
        ? rv.customPalette
            .filter(c => c && typeof c.name === 'string' && Number.isFinite(c.u) && c.u > 0)
            .map(c => ({ id: String(c.id || ('cp-' + Math.random().toString(36).slice(2,8))), name: c.name, u: Math.max(1, Math.min(48, parseInt(c.u))) }))
        : [];
      return {
        faqCollapsed: !!rv.faqCollapsed,
        activeRackId: rv.activeRackId && racks?.some(r => r.id === rv.activeRackId) ? rv.activeRackId : firstId,
        customPalette
      };
    }
    // Entfernt Cabling-Einträge, deren Endgerät (AP/Kamera) oder rack-Item nicht mehr existiert.
    // Gibt die Anzahl der entfernten Einträge zurück.
    function pruneOrphanConnections() {
      if(!state.cabling || !Array.isArray(state.cabling.connections)) return 0;
      const deviceIds = new Set();
      state.floors.forEach(f => {
        (f.aps || []).forEach(ap => deviceIds.add(ap.id));
        (f.cameras || []).forEach(c => deviceIds.add(c.id));
      });
      const rackItemIds = new Set();
      (state.racks || []).forEach(r => (r.items || []).forEach(it => rackItemIds.add(it.id)));
      const before = state.cabling.connections.length;
      state.cabling.connections = state.cabling.connections.filter(cn =>
        deviceIds.has(cn.deviceId) && rackItemIds.has(cn.rackItemId)
      );
      return before - state.cabling.connections.length;
    }

    // --- State Persistence (localStorage) --- //
    const STATE_KEY = 'unifi-planner:state:v1';
    function saveState() {
      try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(_) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        if(!raw) return;
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === 'object' && Array.isArray(parsed.floors)) {
          // Migration: alte Floors ohne cameras[]
          parsed.floors = parsed.floors.map(f => ({ cameras: [], ...f }));
          if(!parsed.view) parsed.view = { heatmap: false };
          if(!Array.isArray(parsed.vlans)) parsed.vlans = [];
          parsed.backup = normalizeBackupState(parsed.backup);
          parsed.bomOverrides = normalizeBomOverrides(parsed.bomOverrides);
          if(!parsed.poeAssignments || typeof parsed.poeAssignments !== 'object') parsed.poeAssignments = {};
          parsed.racks = normalizeRacksState(parsed.racks);
          parsed.cabling = normalizeCablingState(parsed.cabling);
          parsed.rackView = normalizeRackView(parsed.rackView, parsed.racks);
          parsed.rackViewOpen = false;
          Object.assign(state, parsed);
        }
      } catch(_) { /* invalid JSON — stille Fallback auf Defaults */ }
    }
    window.resetPlannerState = () => {
      if(!confirm('Aktuelles Projekt wirklich zurücksetzen? Alle Eingaben werden gelöscht.')) return;
      try { localStorage.removeItem(STATE_KEY); } catch(_) {}
      location.reload();
    };

    const getGatewayRecommended = () => {
      if(state.gateway && productCache.specs[state.gateway]) return productCache.specs[state.gateway];
      const spd = parseInt(state.speedDown);
      const isFiber = state.isp?.type.includes('Glasfaser');
      const needsDualWan = !!state.backup?.enabled;
      const gws = productCache.gateways.map(g => productCache.specs[g.slug]).filter(Boolean);
      const pool = needsDualWan ? gws.filter(g => DUAL_WAN_GATEWAYS.has(g.slug)) : gws;

      // Basic dynamic fallback search
      let target = pool.find(g => g.slug.includes('ucg-ultra')); // base
      if(spd > 1000) target = pool.find(g => g.slug.includes('ucg-max')) || target;
      if(isFiber && spd >= 1000) target = pool.find(g => g.slug.includes('enterprise') || g.slug.includes('pro')) || target;
      if(needsDualWan && state.backup?.type === 'cellular') {
        const cm = CELLULAR_PRODUCTS.find(p => p.id === state.backup.cellularModel);
        if(cm?.integratedGateway) {
          target = pool.find(g => g.slug === cm.id) || target;
        }
      }

      return target || pool[0] || gws[0] || { name: 'UniFi Cloud Gateway', price: 150 };
    }


    // --- Render Engine --- //
    const contentDiv = document.getElementById('app-content');
    
    function render() {
      document.querySelectorAll('.step-node').forEach(el => el.className = `step-node ${parseInt(el.getAttribute('data-step')) === state.currentStep ? 'active' : parseInt(el.getAttribute('data-step')) < state.currentStep ? 'completed' : ''}`);
      document.querySelectorAll('.step-line').forEach(el => el.className = `step-line ${parseInt(el.id.replace('line-', '')) < state.currentStep ? 'active' : ''}`);

      document.getElementById('btn-prev').classList.toggle('hidden', state.currentStep === 1);
      const btnNext = document.getElementById('btn-next');
      if (state.currentStep === 6) {
        btnNext.innerHTML = '<i data-lucide="printer" class="w-4 h-4"></i> PDF Exportieren';
        btnNext.onclick = () => window.print();
      } else {
        btnNext.innerHTML = 'Weiter <i data-lucide="arrow-right" class="w-4 h-4"></i>';
        btnNext.onclick = () => { if (state.currentStep < 6) { state.currentStep++; render(); } };
      }

      contentDiv.innerHTML = '';
      if(state.currentStep === 1) renderStep1();
      else if(state.currentStep === 2) renderStep2();
      else if(state.currentStep === 3) renderStep3();
      else if(state.currentStep === 4) renderStep4();
      else if(state.currentStep === 5) renderStep5();
      else if(state.currentStep === 6) renderStep6();

      lucide.createIcons();
      saveState();
      if (typeof renderRackOverlay === 'function') renderRackOverlay();
    }

    // --- STEP 1: Internet --- //
    function renderStep1() {
      const container = document.createElement('div');
      container.className = 'fade-in flex flex-col gap-6';

      container.innerHTML = `
        <h2 class="mb-2">1. Internetanschluss</h2>
        <div class="card p-6">
          <label class="block text-sm font-bold mb-2">Anbieter & Technologie</label>
          <select id="isp-select" class="w-full bg-nexus-surface border border-nexus-border rounded-lg px-4 py-3 focus:outline-none focus:border-nexus-primary">
            <option value="" disabled ${!state.isp ? 'selected' : ''}>Bitte wählen...</option>
            ${ispList.map(i => `<option value="${i.id}" ${state.isp?.id === i.id ? 'selected' : ''}>${i.name} - ${i.type}</option>`).join('')}
          </select>
        </div>

        <div id="isp-recommendation" class="card p-6 bg-nexus-surfaceCard hidden">
          <div class="flex gap-4 items-start">
            <div class="bg-nexus-surface p-3 rounded-lg text-nexus-primary"><i data-lucide="router" class="w-8 h-8"></i></div>
            <div>
              <h3 class="text-lg font-bold" id="rec-modem-name"></h3>
              <p class="text-sm text-nexus-muted mt-1" id="rec-modem-notes"></p>
            </div>
          </div>
        </div>

        <div class="card p-6">
          <h3 class="text-lg font-bold mb-4">Verbindungsgeschwindigkeit</h3>
          <div class="mb-6">
            <div class="flex justify-between mb-2 items-center">
              <label class="font-medium text-sm">Download</label>
              <div class="flex items-center gap-1 font-bold text-nexus-primary">
                <input type="number" id="input-down" min="16" max="10000" value="${state.speedDown}" class="w-16 text-right bg-transparent border-b border-transparent hover:border-nexus-border focus:border-nexus-primary focus:outline-none appearance-none" style="-moz-appearance: textfield;">
                <span>Mbit/s</span>
              </div>
            </div>
            <input type="range" id="slider-down" min="16" max="10000" step="10" value="${state.speedDown}" class="w-full accent-nexus-primary cursor-pointer">
          </div>
          <div>
            <div class="flex justify-between mb-2 items-center">
              <label class="font-medium text-sm">Upload</label>
              <div class="flex items-center gap-1 font-bold text-nexus-primary">
                <input type="number" id="input-up" min="10" max="10000" value="${state.speedUp}" class="w-16 text-right bg-transparent border-b border-transparent hover:border-nexus-border focus:border-nexus-primary focus:outline-none appearance-none" style="-moz-appearance: textfield;">
                <span>Mbit/s</span>
              </div>
            </div>
            <input type="range" id="slider-up" min="10" max="10000" step="10" value="${state.speedUp}" class="w-full accent-nexus-primary cursor-pointer">
          </div>
        </div>
        
        </div>
        
        <div class="card p-6 mt-6">
          <label class="block text-sm font-bold mb-2">UniFi Gateway / Router</label>
          <select id="gateway-select" class="w-full bg-nexus-surface border border-nexus-border rounded-lg px-4 py-3 focus:outline-none focus:border-nexus-primary">
            <option value="" ${!state.gateway ? 'selected' : ''}>Automatisch nach Speed empfehlen</option>
            ${productCache.gateways.map(g => `<option value="${g.slug}" ${state.gateway === g.slug ? 'selected' : ''}>${productCache.specs[g.slug]?.name || g.name}</option>`).join('')}
          </select>
        </div>

        <div id="gateway-recommendation" class="card p-6 border-nexus-primary bg-opacity-5 hidden mt-6"></div>
        <div id="gateway-backup-warning" class="card p-4 border-l-4 border-yellow-500 bg-yellow-50 hidden mt-4"></div>
      `;
      contentDiv.appendChild(container);

      const updateRecs = () => {
        if(state.isp) {
          container.querySelector('#isp-recommendation').classList.remove('hidden');
          container.querySelector('#rec-modem-name').textContent = 'Modem-Empfehlung: ' + state.isp.modemRec;
          container.querySelector('#rec-modem-notes').textContent = 'Hinweis: ' + state.isp.notes;

          const gw = getGatewayRecommended();
          const gwDiv = container.querySelector('#gateway-recommendation');
          gwDiv.classList.remove('hidden');
          gwDiv.innerHTML = `
            <div class="flex gap-4 items-start">
              <div class="bg-nexus-primary text-white p-3 rounded-lg"><i data-lucide="server" class="w-8 h-8"></i></div>
              <div>
                <span class="text-xs font-bold uppercase tracking-wide text-nexus-primary">${state.gateway ? 'Ausgewähltes Gateway' : 'Live Data Gateway Empfehlung'}</span>
                <h3 class="text-lg font-bold mt-1">${gw.name}</h3>
              </div>
            </div>
          `;

          // Backup-Warnung: aktives Backup + Gateway ohne Dual-WAN
          const warnDiv = container.querySelector('#gateway-backup-warning');
          if(state.backup?.enabled && !DUAL_WAN_GATEWAYS.has(gw.slug)) {
            const suggestions = productCache.gateways
              .map(g => productCache.specs[g.slug])
              .filter(g => g && DUAL_WAN_GATEWAYS.has(g.slug))
              .slice(0, 3)
              .map(g => g.name)
              .join(', ') || 'UDM Pro / UCG Max / EFG';
            warnDiv.innerHTML = `
              <div class="font-bold text-yellow-800 mb-1 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Backup-Internet aktiv, aber Gateway ohne zweites WAN</div>
