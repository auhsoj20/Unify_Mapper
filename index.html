            warnDiv.classList.remove('hidden');
          } else {
            warnDiv.classList.add('hidden');
          }
          lucide.createIcons();
        }
      };

      const sDown = container.querySelector('#slider-down');
      const iDown = container.querySelector('#input-down');
      const sUp = container.querySelector('#slider-up');
      const iUp = container.querySelector('#input-up');

      const handleDown = (v) => { state.speedDown = v; sDown.value = v; iDown.value = v; updateRecs(); };
      const handleUp = (v) => { state.speedUp = v; sUp.value = v; iUp.value = v; };

      container.querySelector('#isp-select').addEventListener('change', (e) => { state.isp = ispList.find(i => i.id === e.target.value); updateRecs(); });
      sDown.addEventListener('input', (e) => handleDown(e.target.value));
      iDown.addEventListener('input', (e) => handleDown(e.target.value));
      sUp.addEventListener('input', (e) => handleUp(e.target.value));
      iUp.addEventListener('input', (e) => handleUp(e.target.value));
      container.querySelector('#gateway-select').addEventListener('change', (e) => { state.gateway = e.target.value; updateRecs(); });

      if(state.isp) updateRecs();
    }

    // --- STEP 2: Rooms (SVG Vector Engine) --- //
    function renderStep2() {
      const container = document.createElement('div');
      container.className = 'fade-in flex flex-col gap-6';

      const currentFloor = state.floors.find(f => f.id === state.currentFloorId);
      
      // Migration: Convert old rooms to points array
      currentFloor.rooms.forEach(r => {
         if(!r.points) {
            r.points = [{x: r.x, y: r.y}, {x: r.x+r.w, y: r.y}, {x: r.x+r.w, y: r.y+r.h}, {x: r.x, y: r.y+r.h}];
         }
      });

      const ITEMS_PER_ROW = 4;
      const apItems = productCache.wifi.map(p => {
        const spec = productCache.specs[p.slug];
        if(!spec) return '';
        const radiusMeters = Math.round(Math.sqrt(spec.coverageM2 || 140));
        const thumb = spec.image
          ? `<img src="${spec.image}" alt="${spec.name}" loading="lazy" class="w-10 h-10 object-contain shrink-0 bg-white rounded" />`
          : `<div class="w-8 h-8 rounded-full bg-nexus-primary flex items-center justify-center text-white shrink-0"><i data-lucide="wifi" class="w-4 h-4"></i></div>`;
        return `
          <div class="card p-3 flex items-center gap-3 cursor-grab hover:bg-nexus-surface transition-colors" draggable="true" data-slug="${p.slug}" data-kind="ap">
            ${thumb}
            <div>
              <div class="text-sm font-bold leading-tight">${spec.name}</div>
              <div class="text-[10px] text-nexus-muted mt-0.5">${spec.wifiStandard || 'WiFi'} • ~${radiusMeters}m Radius</div>
            </div>
          </div>
        `;
      }).filter(Boolean);

      const hasMore = apItems.length > ITEMS_PER_ROW;
      const visibleItems = apItems.slice(0, ITEMS_PER_ROW).join('');
      const hiddenItems = apItems.slice(ITEMS_PER_ROW).map(h => h.replace('class="card', 'class="card ap-extra-item')).join('');

      const cameraItems = (productCache.protect || []).filter(p => p.type !== 'nvr').map(p => {
        const spec = productCache.specs[p.slug];
        if(!spec) return '';
        const thumb = spec.image
          ? `<img src="${spec.image}" alt="${spec.name}" loading="lazy" class="w-10 h-10 object-contain shrink-0 bg-white rounded" />`
          : `<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-white shrink-0"><i data-lucide="video" class="w-4 h-4"></i></div>`;
        return `
          <div class="card p-3 flex items-center gap-3 cursor-grab hover:bg-nexus-surface transition-colors" draggable="true" data-slug="${p.slug}" data-kind="camera">
            ${thumb}
            <div>
              <div class="text-sm font-bold leading-tight">${spec.name}</div>
              <div class="text-[10px] text-nexus-muted mt-0.5">${spec.resolutionMP} MP • ${spec.poeWatts} W PoE</div>
            </div>
          </div>
        `;
      }).filter(Boolean);
      const camHasMore = cameraItems.length > ITEMS_PER_ROW;
      const camVisibleItems = cameraItems.slice(0, ITEMS_PER_ROW).join('');
      const camHiddenItems = cameraItems.slice(ITEMS_PER_ROW).map(h => h.replace('class="card', 'class="card cam-extra-item')).join('');
      const camShowMoreBtn = camHasMore ? `
        <div class="w-full flex justify-center mt-1">
          <button id="btn-cam-toggle" onclick="window.toggleExtraItems('cam')" class="flex items-center gap-1.5 text-xs font-bold text-nexus-muted hover:text-nexus-primary transition-colors py-1 px-3 rounded-full border border-nexus-border hover:border-nexus-primary">
            <i data-lucide="chevrons-down" class="w-3.5 h-3.5" id="cam-toggle-icon"></i>
            <span id="cam-toggle-label">${cameraItems.length - ITEMS_PER_ROW} weitere anzeigen</span>
          </button>
        </div>` : '';
      const camToolbarHtml = cameraItems.length > 0 ? `
        <div class="flex items-center gap-2 mt-3">
          <span class="text-xs font-bold uppercase tracking-wide text-nexus-muted">Kameras (UniFi Protect)</span>
        </div>
        <div class="flex flex-wrap gap-4" id="cam-toolbar">
          ${camVisibleItems}
          <div id="cam-extra" class="contents" style="display:none">${camHiddenItems}</div>
        </div>
        ${camShowMoreBtn}
      ` : '';

      const showMoreBtn = hasMore ? `
        <div class="w-full flex justify-center mt-1">
          <button id="btn-ap-toggle" onclick="window.toggleExtraItems('ap')" class="flex items-center gap-1.5 text-xs font-bold text-nexus-muted hover:text-nexus-primary transition-colors py-1 px-3 rounded-full border border-nexus-border hover:border-nexus-primary">
            <i data-lucide="chevrons-down" class="w-3.5 h-3.5" id="ap-toggle-icon"></i>
            <span id="ap-toggle-label">${apItems.length - ITEMS_PER_ROW} weitere anzeigen</span>
          </button>
        </div>` : '';

      const tabsHtml = state.floors.map(f => `
         <button id="tab-${f.id}" class="px-4 py-3 border-b-2 font-bold ${f.id === state.currentFloorId ? 'border-nexus-primary text-nexus-primary' : 'border-transparent text-nexus-muted hover:text-nexus-base'}" onclick="window.switchFloor('${f.id}')" ondblclick="window.startFloorRename('${f.id}', this); event.stopPropagation();" title="Doppelklick zum Umbenennen">${f.name}</button>
      `).join('') + `<button class="px-4 py-3 text-nexus-muted hover:text-nexus-primary" onclick="window.addFloor()"><i data-lucide="plus" class="w-4 h-4"></i></button>`;

      let inspectorHtml = '';
      if(state.selectedRoomId) {
         const sr = currentFloor.rooms.find(r => r.id === state.selectedRoomId);
         if(sr) {
            inspectorHtml = `
               <div class="card p-4 flex flex-wrap gap-4 items-end mt-2 bg-nexus-surfaceCard border-l-4 border-l-nexus-primary">
                  <div class="flex-1 min-w-[200px]">
                     <label class="block text-xs font-bold mb-1 text-nexus-primary">Ausgewählter Raum</label>
                     <input type="text" id="insp-name" value="${sr.name}" class="w-full bg-nexus-surface border border-nexus-border rounded px-3 py-2 text-sm focus:outline-none focus:border-nexus-primary font-bold">
                  </div>
                  <button onclick="window.deleteRoom('${sr.id}')" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 transition-colors font-bold text-sm" title="Raum löschen"><i data-lucide="trash-2" class="w-4 h-4 inline-block mr-1"></i> Löschen</button>
               </div>
            `;
         }
      }

      container.innerHTML = `
        <h2>2. Raumplanung & Etagen</h2>
        <div class="flex flex-col gap-2 mb-2">
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold uppercase tracking-wide text-nexus-muted">Access Points</span>
          </div>
          <div class="flex flex-wrap gap-4" id="ap-toolbar">
            ${visibleItems}
            <div id="ap-extra" class="contents" style="display:none">${hiddenItems}</div>
          </div>
          ${showMoreBtn}
          ${camToolbarHtml}
        </div>
        
        <div class="card overflow-hidden">
          <div class="flex justify-between items-center border-b border-nexus-border px-2 bg-nexus-surface bg-opacity-50">
             <div class="flex flex-wrap">${tabsHtml}</div>
             <div class="flex items-center gap-2 mr-2 my-2">
               <button onclick="window.toggleHeatmap()" class="text-xs font-bold flex items-center gap-1 px-3 py-1.5 rounded transition-opacity ${state.view && state.view.heatmap ? 'bg-emerald-600 text-white' : 'bg-nexus-surface text-nexus-muted border border-nexus-border hover:text-nexus-base'}" title="Signal-Heatmap umschalten">
                  <i data-lucide="thermometer" class="w-3 h-3"></i> Heatmap ${state.view && state.view.heatmap ? 'an' : 'aus'}
               </button>
               <button class="text-sm font-bold flex items-center gap-1 text-white bg-nexus-primary px-3 py-1.5 rounded hover:opacity-80 transition-opacity" onclick="window.addRoom()">
                  <i data-lucide="plus-square" class="w-4 h-4"></i> Neuer Raum
               </button>
             </div>
          </div>
          <div id="planner-area" class="w-full h-[500px] relative bg-nexus-surface overflow-hidden" ondragover="event.preventDefault()">
             <!-- SVG Canvas & Elements injected dynamically -->
          </div>
        </div>
        ${inspectorHtml}
      `;
      contentDiv.appendChild(container);

      // Actions
      window.switchFloor = (id) => { state.currentFloorId = id; state.selectedRoomId = null; render(); };
      window.addFloor = () => {
         const id = 'f-'+Date.now();
         const num = state.floors.length + 1;
         state.floors.push({ id, name: `Neue Etage ${num}`, rooms: [], aps: [], cameras: [] });
         state.currentFloorId = id; state.selectedRoomId = null; render();
      };
      window.addRoom = () => {
         currentFloor.rooms.push({ id: 'r-'+Date.now(), name: 'Neuer Raum', points: [{x:2,y:2},{x:8,y:2},{x:8,y:7},{x:2,y:7}] });
         state.selectedRoomId = currentFloor.rooms[currentFloor.rooms.length-1].id;
         render();
      };
      window.deleteRoom = (id) => {
         currentFloor.rooms = currentFloor.rooms.filter(r => r.id !== id);
         state.selectedRoomId = null; render();
      };
      


      window.startFloorRename = (id, btn) => {
         const floor = state.floors.find(f => f.id === id);
         if (!floor) return;
         if (state.currentFloorId !== id) { state.currentFloorId = id; render(); return; }
         const input = document.createElement('input');
         input.type = 'text';
         input.value = floor.name;
         input.className = 'bg-transparent border-b-2 border-nexus-primary outline-none font-bold text-nexus-primary w-28 text-sm px-1';
         btn.textContent = '';
         btn.appendChild(input);
         input.focus();
         input.select();
         const commit = () => {
            const newName = input.value.trim() || floor.name;
            floor.name = newName;
            btn.textContent = newName;
         };
         input.addEventListener('blur', commit);
         input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { input.blur(); }
            if (e.key === 'Escape') { input.value = floor.name; input.blur(); }
            e.stopPropagation();
         });
      };
      window.toggleExtraItems = (prefix) => {
         const extra = document.getElementById(`${prefix}-extra`);
         const label = document.getElementById(`${prefix}-toggle-label`);
         const icon = document.getElementById(`${prefix}-toggle-icon`);
         const toolbar = document.getElementById(`${prefix}-toolbar`);
         if (!extra) return;
         const extraClass = `${prefix}-extra-item`;
         const isHidden = extra.style.display === 'none';
         if (isHidden) {
            extra.style.display = '';
            [...extra.children].forEach(el => toolbar.insertBefore(el, extra));
            label.textContent = 'Weniger anzeigen';
            icon.setAttribute('data-lucide', 'chevrons-up');
         } else {
            const extras = toolbar.querySelectorAll(`.${extraClass}`);
            extras.forEach(el => extra.appendChild(el));
            extra.style.display = 'none';
            const count = extra.children.length;
            label.textContent = count + ' weitere anzeigen';
            icon.setAttribute('data-lucide', 'chevrons-down');
         }
         lucide.createIcons();
      };
      window.toggleApItems = () => window.toggleExtraItems('ap');
      if(state.selectedRoomId) {
         setTimeout(() => {
            const elN = document.getElementById('insp-name');
            if(elN) {
               elN.addEventListener('change', () => {
                   const sr = currentFloor.rooms.find(r => r.id === state.selectedRoomId);
                   if(sr) { sr.name = elN.value; render(); }
               });
            }
         }, 0);
      }

      const planner = document.getElementById('planner-area');
      const CELL_SIZE = 20;
      
      // Setup SVG Context
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'absolute inset-0 w-full h-full pointer-events-none');
      svg.style.zIndex = '1';
      planner.appendChild(svg);
      
      const heatmapCanvas = document.createElement('canvas');
      heatmapCanvas.className = 'absolute inset-0 pointer-events-none';
      heatmapCanvas.style.width = '100%';
      heatmapCanvas.style.height = '100%';
      heatmapCanvas.style.zIndex = '5';
      planner.appendChild(heatmapCanvas);

      const labelsLayer = document.createElement('div');
      labelsLayer.className = 'absolute inset-0 w-full h-full pointer-events-none z-10';
      planner.appendChild(labelsLayer);

      let dragMode = null; // 'poly', 'vert', 'ap'
      let activeObj = null;
      let activeVertIdx = -1;
      let dOffX = 0, dOffY = 0;

      // Draw SVG Polygons
      currentFloor.rooms.forEach(room => {
         const isSel = (state.selectedRoomId === room.id);
         const ptsString = room.points.map(p => `${p.x*CELL_SIZE},${p.y*CELL_SIZE}`).join(' ');
         
         const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
         poly.setAttribute('points', ptsString);
         poly.setAttribute('class', `pointer-events-auto cursor-move transition-all ${isSel ? 'fill-nexus-primary/20 stroke-nexus-primary stroke-[3px]' : 'fill-white/80 stroke-nexus-border stroke-[1.5px]'}`);
         
         poly.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            dragMode = 'poly'; activeObj = room;
            const rect = planner.getBoundingClientRect();
            dOffX = e.clientX - rect.left; dOffY = e.clientY - rect.top;
            if(!isSel) { state.selectedRoomId = room.id; render(); }
         });
         svg.appendChild(poly);

         // Label
         const minX = Math.min(...room.points.map(p=>p.x))*CELL_SIZE;
         const maxX = Math.max(...room.points.map(p=>p.x))*CELL_SIZE;
         const minY = Math.min(...room.points.map(p=>p.y))*CELL_SIZE;
         const maxY = Math.max(...room.points.map(p=>p.y))*CELL_SIZE;
         const lbl = document.createElement('div');
         lbl.id = `lbl-${room.id}`;
         lbl.className = 'absolute text-xs font-bold whitespace-nowrap text-center opacity-80 cursor-move pointer-events-auto hover:text-nexus-primary hover:scale-110 transition-transform';
         let lX, lY;
         if(room.labelPos) {
            lX = room.labelPos.x; lY = room.labelPos.y;
         } else {
            lX = (minX + (maxX-minX)/2); 
            lY = (minY + (maxY-minY)/2);
         }
         lbl.style.left = lX + 'px';
         lbl.style.top = lY + 'px';
         lbl.style.transform = 'translate(-50%, -50%)';
         lbl.innerText = room.name;

         lbl.addEventListener('mousedown', (e) => {
             e.stopPropagation();
             dragMode = 'label'; activeObj = room;
             const rect = planner.getBoundingClientRect();
             dOffX = (e.clientX - rect.left) - lX;
             dOffY = (e.clientY - rect.top) - lY;
             if(!isSel) { state.selectedRoomId = room.id; render(); }
         });

         labelsLayer.appendChild(lbl);

         // Vertex Handlers and Edge Labels
         if(isSel) {
            room.points.forEach((pt, i) => {
               // Edge label (SVG text)
               const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
               text.setAttribute('class', 'edge-label fill-nexus-primary font-bold pointer-events-none text-[10px] select-none');
               text.setAttribute('text-anchor', 'middle');
               let nxt = room.points[(i+1)%room.points.length];
               let dist = Math.hypot(nxt.x-pt.x, nxt.y-pt.y);
               let midX = (pt.x + nxt.x)/2 * CELL_SIZE;
               let midY = (pt.y + nxt.y)/2 * CELL_SIZE - 6;
               text.setAttribute('x', midX);
               text.setAttribute('y', midY);
               text.textContent = dist.toFixed(1) + 'm';
               svg.appendChild(text);

               // Invisible Edge Hitbox for Adding new Points
               const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
               line.setAttribute('x1', pt.x * CELL_SIZE);
               line.setAttribute('y1', pt.y * CELL_SIZE);
               line.setAttribute('x2', nxt.x * CELL_SIZE);
               line.setAttribute('y2', nxt.y * CELL_SIZE);
               line.setAttribute('class', 'stroke-transparent stroke-[12px] pointer-events-auto cursor-crosshair hover:stroke-nexus-primary/30 edge-hitbox transition-colors');
               
               line.addEventListener('mousedown', (e) => {
                  e.stopPropagation();
                  const rect = planner.getBoundingClientRect();
                  let nx = Math.round((e.clientX - rect.left) / CELL_SIZE);
                  let ny = Math.round((e.clientY - rect.top) / CELL_SIZE);
                  room.points.splice(i+1, 0, {x: Math.max(0, nx), y: Math.max(0, ny)});
                  render();
               });
               svg.appendChild(line);

               // Circle Handler
               const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
               circle.setAttribute('cx', pt.x * CELL_SIZE);
               circle.setAttribute('cy', pt.y * CELL_SIZE);
               circle.setAttribute('r', '6');
               circle.setAttribute('class', 'fill-white stroke-nexus-primary stroke-[2px] pointer-events-auto cursor-pointer hover:fill-nexus-primary');
               circle.setAttribute('title', 'Ziehen zum Verschieben · Rechtsklick zum Löschen');
               
               circle.addEventListener('mousedown', (e) => {
                  if (e.button !== 0) return; // only left click drags
                  e.stopPropagation();
                  dragMode = 'vert'; activeObj = room; activeVertIdx = i;
                  const rect = planner.getBoundingClientRect();
                  dOffX = (e.clientX - rect.left) - (pt.x*CELL_SIZE);
                  dOffY = (e.clientY - rect.top) - (pt.y*CELL_SIZE);
               });

               circle.addEventListener('contextmenu', (e) => {
                  e.preventDefault();
                  e.stopPropagation();
                  if (room.points.length <= 3) return; // keep at least a triangle
                  room.points.splice(i, 1);
                  render();
               });
               svg.appendChild(circle);
            });
         }
      });

      planner.addEventListener('mousemove', (e) => {
         if(!dragMode || !activeObj) return;
         const rect = planner.getBoundingClientRect();
         
         if(dragMode === 'vert') {
             let nx = Math.round(((e.clientX - rect.left) - dOffX) / CELL_SIZE);
             let ny = Math.round(((e.clientY - rect.top) - dOffY) / CELL_SIZE);
             activeObj.points[activeVertIdx].x = Math.max(0, nx);
             activeObj.points[activeVertIdx].y = Math.max(0, ny);
             flushVectors(); // Fast local visual update
         } 
         else if(dragMode === 'poly') {
             let dx = Math.round((e.clientX - rect.left - dOffX) / CELL_SIZE);
             let dy = Math.round((e.clientY - rect.top - dOffY) / CELL_SIZE);
             if(dx !== 0 || dy !== 0) {
                 const minX = Math.min(...activeObj.points.map(p=>p.x));
                 const minY = Math.min(...activeObj.points.map(p=>p.y));
                 if(minX + dx < 0) dx = -minX;
                 if(minY + dy < 0) dy = -minY;
                 
                 activeObj.points.forEach(p => { p.x += dx; p.y += dy; });
                 if(activeObj.labelPos) { activeObj.labelPos.x += dx * CELL_SIZE; activeObj.labelPos.y += dy * CELL_SIZE; }
                 dOffX += dx * CELL_SIZE; dOffY += dy * CELL_SIZE;
                 flushVectors();
             }
         }
         else if(dragMode === 'label') {
             if(!activeObj.labelPos) {
               const minX = Math.min(...activeObj.points.map(p=>p.x))*CELL_SIZE;
               const maxX = Math.max(...activeObj.points.map(p=>p.x))*CELL_SIZE;
               const minY = Math.min(...activeObj.points.map(p=>p.y))*CELL_SIZE;
               const maxY = Math.max(...activeObj.points.map(p=>p.y))*CELL_SIZE;
               activeObj.labelPos = { x: (minX + (maxX-minX)/2), y: (minY + (maxY-minY)/2) };
             }
             activeObj.labelPos.x = Math.max(0, e.clientX - rect.left - dOffX);
             activeObj.labelPos.y = Math.max(0, e.clientY - rect.top - dOffY);
             flushVectors();
         }
         else if(dragMode === 'ap' || dragMode === 'cam') {
             activeObj.x = Math.max(0, e.clientX - rect.left - dOffX);
             activeObj.y = Math.max(0, e.clientY - rect.top - dOffY);
             drawAps();
         }
      });

      const commitDrag = () => { if(dragMode) { dragMode = null; render(); } };
      planner.addEventListener('mouseup', commitDrag);
      planner.addEventListener('mouseleave', commitDrag);

      // Super-fast redraw loop for active dragging
      const flushVectors = () => {
         if(!activeObj) return;
         if(dragMode === 'poly' || dragMode === 'vert' || dragMode === 'label') {
            const polyEl = svg.querySelector('polygon.stroke-nexus-primary');
            if(polyEl) polyEl.setAttribute('points', activeObj.points.map(p => `${p.x*CELL_SIZE},${p.y*CELL_SIZE}`).join(' '));
            
            const circles = svg.querySelectorAll('circle');
            const labels = svg.querySelectorAll('text.edge-label');
            const hitboxes = svg.querySelectorAll('line.edge-hitbox');
            activeObj.points.forEach((pt, i) => {
               if(circles[i]) { circles[i].setAttribute('cx', pt.x * CELL_SIZE); circles[i].setAttribute('cy', pt.y * CELL_SIZE); }
               
               let nxt = activeObj.points[(i+1)%activeObj.points.length];
               
               if(hitboxes[i]) {
                  hitboxes[i].setAttribute('x1', pt.x * CELL_SIZE);
                  hitboxes[i].setAttribute('y1', pt.y * CELL_SIZE);
                  hitboxes[i].setAttribute('x2', nxt.x * CELL_SIZE);
                  hitboxes[i].setAttribute('y2', nxt.y * CELL_SIZE);
               }

               if(labels[i]) {
                  let dist = Math.hypot(nxt.x-pt.x, nxt.y-pt.y);
                  let midX = (pt.x + nxt.x)/2 * CELL_SIZE;
                  let midY = (pt.y + nxt.y)/2 * CELL_SIZE - 6;
                  labels[i].setAttribute('x', midX);
                  labels[i].setAttribute('y', midY);
                  labels[i].textContent = dist.toFixed(1) + 'm';
               }
            });
            
            const lblEl = document.getElementById(`lbl-${activeObj.id}`);
            if(lblEl) {
               let lX, lY;
               if(activeObj.labelPos) {
                  lX = activeObj.labelPos.x; lY = activeObj.labelPos.y;
               } else {
                  const minX = Math.min(...activeObj.points.map(p=>p.x))*CELL_SIZE;
                  const maxX = Math.max(...activeObj.points.map(p=>p.x))*CELL_SIZE;
                  const minY = Math.min(...activeObj.points.map(p=>p.y))*CELL_SIZE;
                  const maxY = Math.max(...activeObj.points.map(p=>p.y))*CELL_SIZE;
                  lX = (minX + (maxX-minX)/2); 
                  lY = (minY + (maxY-minY)/2);
               }
               lblEl.style.left = lX + 'px';
               lblEl.style.top = lY + 'px';
            }
         }
      };


      // Sicherstellen, dass Kameras-Array existiert (Legacy-Projekte)
      if(!currentFloor.cameras) currentFloor.cameras = [];

      // Drag-Start für APs und Kameras (Event-Delegation)
      const onDragStart = (e) => {
        const card = e.target.closest('[data-slug]');
        if(!card) return;
        const payload = JSON.stringify({ slug: card.getAttribute('data-slug'), kind: card.getAttribute('data-kind') || 'ap' });
        e.dataTransfer.setData('text/plain', payload);
      };
      document.getElementById('ap-toolbar').addEventListener('dragstart', onDragStart);
      const camToolbar = document.getElementById('cam-toolbar');
      if(camToolbar) camToolbar.addEventListener('dragstart', onDragStart);

      planner.addEventListener('dragover', (e) => e.preventDefault());
      planner.addEventListener('drop', (e) => {
        e.preventDefault();
        let payload;
        try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch(_) { return; }
        if(!payload || !productCache.specs[payload.slug]) return;
        const rect = planner.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        if(payload.kind === 'camera') {
          currentFloor.cameras.push({ id: 'cam_'+Date.now(), slug: payload.slug, x, y });
        } else {
          // Auto-Kanalplan (leichtgewichtig): 2,4 GHz 1/6/11, 5 GHz 36/44/52/60/100/108/116/124/132/140/149/157/165
          const ch24 = [1,6,11];
          const ch5  = [36,44,52,60,100,108,116,124,132,140,149,157,165];
          const used24 = new Set(currentFloor.aps.map(a => a.channel24).filter(Boolean));
          const used5  = new Set(currentFloor.aps.map(a => a.channel5).filter(Boolean));
          const pickFree = (list, used) => list.find(c => !used.has(c)) || list[currentFloor.aps.length % list.length];
          currentFloor.aps.push({ id: 'ap_'+Date.now(), slug: payload.slug, x, y, channel24: pickFree(ch24, used24), channel5: pickFree(ch5, used5) });
        }
        drawAps();
        saveState();
      });

      const apLayer = document.createElement('div');
      apLayer.className = 'absolute inset-0 w-full h-full pointer-events-none z-20';
      planner.appendChild(apLayer);

      const drawHeatmap = () => {
        const w = planner.clientWidth, h = planner.clientHeight;
        if(w === 0 || h === 0) return;
        heatmapCanvas.width = w;
        heatmapCanvas.height = h;
        const ctx = heatmapCanvas.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        if(!state.view || !state.view.heatmap) return;
        if(!currentFloor.aps.length) return;

        const walls = [];
        currentFloor.rooms.forEach(room => {
          if(!room.points || room.points.length < 2) return;
          const pts = room.points;
          for(let i = 0; i < pts.length; i++) {
            const a = pts[i], b = pts[(i+1) % pts.length];
            walls.push({
              x1: a.x * CELL_SIZE, y1: a.y * CELL_SIZE,
              x2: b.x * CELL_SIZE, y2: b.y * CELL_SIZE
            });
          }
        });

        const aps = currentFloor.aps.map(ap => {
          const spec = productCache.specs[ap.slug] || { coverageM2: 140 };
          return { x: ap.x, y: ap.y, r: Math.round(Math.sqrt(spec.coverageM2)) * CELL_SIZE };
        });

        const crosses = (ax, ay, bx, by, cx, cy, dx, dy) => {
          const d1x = bx-ax, d1y = by-ay;
          const d2x = dx-cx, d2y = dy-cy;
          const denom = d1x*d2y - d1y*d2x;
          if(Math.abs(denom) < 1e-9) return false;
          const s = ((cx-ax)*d2y - (cy-ay)*d2x) / denom;
          const t = ((cx-ax)*d1y - (cy-ay)*d1x) / denom;
          return s > 0.002 && s < 0.998 && t > 0.002 && t < 0.998;
        };

        const colorAt = (v) => {
          if(v >= 0.66) {
            const t = (v - 0.66) / 0.34;
            return [Math.round(234 + t*(1-234)), Math.round(179 + t*(105-179)), Math.round(8 + t*(111-8))];
          } else if(v >= 0.33) {
            const t = (v - 0.33) / 0.33;
            return [Math.round(239 + t*(234-239)), Math.round(68 + t*(179-68)), Math.round(68 + t*(8-68))];
          } else {
            return [239, Math.round(68 * (v/0.33)), 68];
          }
        };

        const STEP = 6;
        const ATTEN = 0.45;
        const imgData = ctx.createImageData(w, h);
        const data = imgData.data;

        for(let py = 0; py < h; py += STEP) {
          for(let px = 0; px < w; px += STEP) {
            let best = 0;
            for(const ap of aps) {
              const ddx = px - ap.x, ddy = py - ap.y;
              const dist = Math.sqrt(ddx*ddx + ddy*ddy);
              if(dist > ap.r * 1.4) continue;
              let raw = Math.max(0, 1 - dist / ap.r);
              if(raw <= 0.02) continue;
              let wc = 0;
              for(const wall of walls) {
                if(crosses(ap.x, ap.y, px, py, wall.x1, wall.y1, wall.x2, wall.y2)) {
                  wc++;
                  if(wc >= 4) break;
                }
              }
              const v = raw * Math.pow(ATTEN, wc);
              if(v > best) best = v;
            }
            if(best <= 0.03) continue;
            const [rr, gg, bb] = colorAt(best);
            const alpha = Math.round(180 * Math.min(1, best * 1.2));
            for(let yy = py; yy < py + STEP && yy < h; yy++) {
              const rowStart = yy * w;
              for(let xx = px; xx < px + STEP && xx < w; xx++) {
                const idx = (rowStart + xx) * 4;
                data[idx] = rr; data[idx+1] = gg; data[idx+2] = bb; data[idx+3] = alpha;
              }
            }
          }
        }
        ctx.putImageData(imgData, 0, 0);
      };

      const drawAps = () => {
        apLayer.innerHTML = '';
        const heatmapOn = !!(state.view && state.view.heatmap);

        // APs (einfacher Coverage-Kreis, nur wenn Heatmap aus)
        currentFloor.aps.forEach(apState => {
          const spec = productCache.specs[apState.slug] || { name: 'Unknown', coverageM2: 140 };
          const pxRadius = Math.round(Math.sqrt(spec.coverageM2)) * CELL_SIZE;

          if(!heatmapOn) {
            const cov = document.createElement('div');
            cov.className = 'ap-coverage pointer-events-none';
            cov.style.left = apState.x + 'px'; cov.style.top = apState.y + 'px';
            cov.style.width = (pxRadius*2) + 'px'; cov.style.height = (pxRadius*2) + 'px';
            apLayer.appendChild(cov);
          }

          const dotContainer = document.createElement('div');
          dotContainer.className = 'draggable-ap pointer-events-auto flex flex-col items-center cursor-move group';
          dotContainer.style.left = apState.x + 'px'; dotContainer.style.top = apState.y + 'px';

          const chanBadge = apState.channel5 ? `<span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-nexus-surfaceCard border border-nexus-border text-[8px] font-mono px-1 rounded text-nexus-primary whitespace-nowrap">${apState.channel24}/${apState.channel5}</span>` : '';

          dotContainer.innerHTML = `
            ${chanBadge}
            <div class="w-6 h-6 bg-nexus-primary text-white rounded-full flex items-center justify-center shadow hover:scale-110 transition-transform"><i data-lucide="wifi" class="w-3 h-3"></i></div>
            <span class="absolute top-7 bg-white/90 px-1.5 py-0.5 rounded border border-gray-200 text-[9px] font-bold shadow-sm whitespace-nowrap text-gray-800">${spec.name}</span>
            <button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 items-center justify-center hidden group-hover:flex" title="AP löschen"><i data-lucide="trash-2" class="w-2.5 h-2.5 pointer-events-none"></i></button>
          `;

          dotContainer.addEventListener('mousedown', (e) => {
             e.stopPropagation();
             dragMode = 'ap'; activeObj = apState;
             const rect = planner.getBoundingClientRect();
             dOffX = (e.clientX - rect.left) - apState.x; dOffY = (e.clientY - rect.top) - apState.y;
          });

          dotContainer.querySelector('button').addEventListener('mousedown', (ev) => {
             ev.stopPropagation();
             currentFloor.aps = currentFloor.aps.filter(a => a.id !== apState.id);
             if(dragMode==='ap') {dragMode=null;}
             drawAps();
             saveState();
          });

          apLayer.appendChild(dotContainer);
        });

        // Kameras
        currentFloor.cameras.forEach(camState => {
          const spec = productCache.specs[camState.slug] || { name: 'Kamera', poeWatts: 8 };
          const dotContainer = document.createElement('div');
          dotContainer.className = 'draggable-ap pointer-events-auto flex flex-col items-center cursor-move group';
          dotContainer.style.left = camState.x + 'px'; dotContainer.style.top = camState.y + 'px';
          dotContainer.innerHTML = `
            <div class="w-6 h-6 bg-purple-600 text-white rounded-full flex items-center justify-center shadow hover:scale-110 transition-transform"><i data-lucide="video" class="w-3 h-3"></i></div>
            <span class="absolute top-7 bg-purple-50 px-1.5 py-0.5 rounded border border-purple-200 text-[9px] font-bold shadow-sm whitespace-nowrap text-purple-900">${spec.name}</span>
            <button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 items-center justify-center hidden group-hover:flex" title="Kamera löschen"><i data-lucide="trash-2" class="w-2.5 h-2.5 pointer-events-none"></i></button>
          `;
          dotContainer.addEventListener('mousedown', (e) => {
             e.stopPropagation();
             dragMode = 'cam'; activeObj = camState;
             const rect = planner.getBoundingClientRect();
             dOffX = (e.clientX - rect.left) - camState.x; dOffY = (e.clientY - rect.top) - camState.y;
          });
          dotContainer.querySelector('button').addEventListener('mousedown', (ev) => {
             ev.stopPropagation();
             currentFloor.cameras = currentFloor.cameras.filter(c => c.id !== camState.id);
             if(dragMode==='cam') {dragMode=null;}
             drawAps();
             saveState();
          });
          apLayer.appendChild(dotContainer);
        });

        drawHeatmap();
        lucide.createIcons();
      };
      drawAps();
    }

    // --- STEP 3: Switch --- //
    function computePoeAllocation(allAps, allCameras, switchHasPoe, gatewayHasPoe) {
      const defaultSource = switchHasPoe ? 'switch' : (gatewayHasPoe ? 'gateway' : null);
      const result = {
        switch:  { poe: 0, apCounts: {}, camCounts: {}, devices: [] },
        gateway: { poe: 0, apCounts: {}, camCounts: {}, devices: [] }
      };
      const resolveSource = (id) => {
        if(!switchHasPoe && !gatewayHasPoe) return null;
        if(!switchHasPoe) return 'gateway';
        if(!gatewayHasPoe) return 'switch';
        const saved = state.poeAssignments?.[id];
        return (saved === 'switch' || saved === 'gateway') ? saved : defaultSource;
      };
      allAps.forEach(ap => {
        const src = resolveSource(ap.id);
        if(!src) return;
        const watts = productCache.specs[ap.slug]?.maxWatts || 15;
        result[src].poe += watts;
        result[src].apCounts[ap.slug] = (result[src].apCounts[ap.slug] || 0) + 1;
        result[src].devices.push({ id: ap.id, slug: ap.slug, type: 'ap', watts, name: productCache.specs[ap.slug]?.name || ap.slug });
      });
      allCameras.forEach(c => {
        const src = resolveSource(c.id);
        if(!src) return;
        const watts = productCache.specs[c.slug]?.poeWatts || 8;
        result[src].poe += watts;
        result[src].camCounts[c.slug] = (result[src].camCounts[c.slug] || 0) + 1;
        result[src].devices.push({ id: c.id, slug: c.slug, type: 'camera', watts, name: productCache.specs[c.slug]?.name || c.slug });
      });
      return result;
    }

    function renderStep3() {
      const allAps = state.floors.flatMap(f => f.aps || []);
      const allCameras = state.floors.flatMap(f => f.cameras || []);
      const apPoe = allAps.reduce((sum, ap) => sum + (productCache.specs[ap.slug]?.maxWatts || 15), 0);
      const camPoe = allCameras.reduce((sum, c) => sum + (productCache.specs[c.slug]?.poeWatts || 8), 0);
      const totalPoe = apPoe + camPoe;
      const portsNeeded = allAps.length + allCameras.length + 1; // +1 Uplink

      const switches = productCache.switching.map(s => productCache.specs[s.slug]).filter(s => s && s.ports);
      switches.sort((a,b) => (a.budget || 0) - (b.budget || 0));

      const recSwitch = switches.find(s => (s.budget || 0) >= (totalPoe * 1.2) && s.ports >= portsNeeded) || switches[switches.length-1] || { name: 'Generic PoE Switch', budget: 150, ports: 16 };

      // Use saved selection or fall back to recommendation
      if (!state.selectedSwitch) state.selectedSwitch = recSwitch.slug || recSwitch.name;
      const activeSwitch = switches.find(s => s.slug === state.selectedSwitch) || recSwitch;

      const gatewaySpec = state.gateway ? productCache.specs[state.gateway] : null;
      const gatewayBudget = gatewaySpec?.budget || 0;
      const gatewayHasPoe = gatewayBudget > 0;
      const hasApOrCam = allAps.length > 0 || allCameras.length > 0;
      const switchHasPoe = !!activeSwitch && activeSwitch.poe !== false && (activeSwitch.budget || 0) > 0;
      const bothHavePoe = switchHasPoe && gatewayHasPoe;

      const allocation = computePoeAllocation(allAps, allCameras, switchHasPoe, gatewayHasPoe);

      const renderPoeWarning = () => {
        if(!(hasApOrCam && !switchHasPoe && !gatewayHasPoe)) return '';
        const needParts = [];
        if(allAps.length > 0) needParts.push(`${allAps.length} Access Point${allAps.length === 1 ? '' : 's'}`);
        if(allCameras.length > 0) needParts.push(`${allCameras.length} Kamera${allCameras.length === 1 ? '' : 's'}`);
        const needTxt = needParts.join(' und ');
        return `
          <div class="card p-4 border-l-4 border-yellow-500 bg-yellow-50">
            <div class="font-bold text-yellow-800 mb-1 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> PoE-Switch fehlt</div>
            <p class="text-sm text-yellow-900">Für ${needTxt} wird PoE benötigt, aber der aktuell gewählte Switch liefert kein PoE und das Gateway hat ebenfalls keine PoE-Ports. Bitte einen Switch mit PoE-Budget auswählen.</p>
          </div>`;
      };

      const buildPortState = (sw, switchDevices) => {
        const ports = Array(sw.ports || 8).fill(null);
        ports[0] = { type: 'gateway', name: 'Uplink' };
        let i = 1;
        switchDevices.forEach(d => {
          if (i < ports.length) ports[i++] = { type: d.type, name: d.name, watts: d.watts };
        });
        return ports;
      };

      const container = document.createElement('div');
      container.className = 'fade-in flex flex-col gap-6';

      const renderSwitchCard = (sw) => {
        const ports = buildPortState(sw, allocation.switch.devices);
        const budget = sw.budget || 0;
        const usedPoe = allocation.switch.poe;
        const poePct = budget > 0 ? Math.min(100, Math.round((usedPoe / budget) * 100)) : 0;
        const col = poePct > 90 ? 'bg-red-500' : poePct > 75 ? 'bg-yellow-500' : 'bg-nexus-primary';
        const isRec = sw.slug === recSwitch.slug || sw.name === recSwitch.name;
        const budgetLabel = budget > 0 ? `${budget}W PoE-Budget` : 'Ohne PoE';
        const image = sw.image
          ? `<img src="${sw.image}" alt="${sw.name}" loading="lazy" class="w-24 h-24 object-contain bg-white rounded-lg border border-nexus-border shrink-0" />`
          : '';
        return `
          <div class="card p-6" id="switch-card">
            <div class="flex justify-between items-start mb-4 gap-4">
              <div class="flex items-start gap-4 min-w-0">
                ${image}
                <div class="min-w-0">
                  <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <h3 class="text-lg font-bold">${sw.name}</h3>
                    ${isRec ? '<span class="text-[10px] font-bold uppercase tracking-wide bg-nexus-primary text-white px-2 py-0.5 rounded-full">Empfohlen</span>' : ''}
                  </div>
                  <p class="text-sm text-nexus-muted">${sw.ports} Ports · ${budgetLabel}</p>
                </div>
              </div>
              <div class="text-right shrink-0">
                <div class="text-xs text-nexus-muted uppercase font-bold tracking-wide">Auslastung</div>
                <div class="font-bold text-xl">${usedPoe.toFixed(1)}W <span class="text-sm font-normal text-nexus-muted">/ ${budget}W</span></div>
              </div>
            </div>
            <div class="w-full bg-nexus-border h-3 rounded-full mb-6 overflow-hidden relative">
               <div class="absolute top-0 left-0 h-full ${col} transition-all duration-500 rounded-full" style="width: ${poePct}%;"></div>
            </div>
            <div class="bg-nexus-surface border border-nexus-border rounded-xl p-4 flex flex-wrap gap-2 justify-center items-center shadow-inner">
               ${ports.map((p, i) => `<div class="switch-port ${p ? 'in-use' : ''}" title="${p ? p.name+' ('+(p.watts||0)+'W)' : 'Frei'}"><span class="text-[10px] text-nexus-muted scale-75">${i+1}</span></div>`).join('')}
            </div>
          </div>`;
      };

      const renderGatewayPoeCard = (gw) => {
        if(!gw || !(gw.budget > 0)) return '';
        const budget = gw.budget;
        const usedPoe = allocation.gateway.poe;
        const poePct = Math.min(100, Math.round((usedPoe / budget) * 100));
        const col = poePct > 90 ? 'bg-red-500' : poePct > 75 ? 'bg-yellow-500' : 'bg-nexus-primary';
        const image = gw.image
          ? `<img src="${gw.image}" alt="${gw.name}" loading="lazy" class="w-24 h-24 object-contain bg-white rounded-lg border border-nexus-border shrink-0" />`
          : '';
        return `
          <div class="card p-6" id="gateway-poe-card">
            <div class="flex justify-between items-start mb-4 gap-4">
              <div class="flex items-start gap-4 min-w-0">
                ${image}
                <div class="min-w-0">
                  <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <h3 class="text-lg font-bold">${gw.name}</h3>
                    <span class="text-[10px] font-bold uppercase tracking-wide bg-nexus-primary text-white px-2 py-0.5 rounded-full">PoE-Quelle</span>
                  </div>
                  <p class="text-sm text-nexus-muted">Gateway · ${budget}W PoE-Budget</p>
                </div>
              </div>
              <div class="text-right shrink-0">
                <div class="text-xs text-nexus-muted uppercase font-bold tracking-wide">Auslastung</div>
                <div class="font-bold text-xl">${usedPoe.toFixed(1)}W <span class="text-sm font-normal text-nexus-muted">/ ${budget}W</span></div>
              </div>
            </div>
            <div class="w-full bg-nexus-border h-3 rounded-full overflow-hidden relative">
               <div class="absolute top-0 left-0 h-full ${col} transition-all duration-500 rounded-full" style="width: ${poePct}%;"></div>
            </div>
          </div>`;
      };

      const renderAssignmentCard = () => {
        if(!bothHavePoe || !hasApOrCam) return '';
        // Aggregate ports per slug to avoid per-device rows when many identical devices exist.
        const rows = [];
        const seenSlugs = new Set();
        const defaultSource = 'switch';
        const allDevices = [
          ...allAps.map(a => ({ id: a.id, slug: a.slug, type: 'ap', watts: productCache.specs[a.slug]?.maxWatts || 15, name: productCache.specs[a.slug]?.name || a.slug })),
          ...allCameras.map(c => ({ id: c.id, slug: c.slug, type: 'camera', watts: productCache.specs[c.slug]?.poeWatts || 8, name: productCache.specs[c.slug]?.name || c.slug })),
        ];
        // Disambiguate names by index per slug.
        const slugIndex = {};
        const slugTotal = {};
        allDevices.forEach(d => slugTotal[d.slug] = (slugTotal[d.slug] || 0) + 1);
        allDevices.forEach(d => {
          slugIndex[d.slug] = (slugIndex[d.slug] || 0) + 1;
          d.displayName = slugTotal[d.slug] > 1 ? `${d.name} #${slugIndex[d.slug]}` : d.name;
          const saved = state.poeAssignments?.[d.id];
          d.source = (saved === 'switch' || saved === 'gateway') ? saved : defaultSource;
        });
        const btn = (src, active, id) => `<button type="button" class="poe-assign-btn px-3 py-1 text-xs font-bold transition-colors ${active ? 'bg-nexus-primary text-white' : 'text-nexus-muted hover:bg-nexus-surface'}" data-id="${id}" data-src="${src}">${src === 'switch' ? 'Switch' : 'Gateway'}</button>`;
        return `
          <div class="card p-6" id="poe-assignment-card">
            <div class="flex items-center justify-between mb-2 gap-2 flex-wrap">
              <h3 class="text-base font-bold">PoE-Zuordnung</h3>
              <span class="text-xs text-nexus-muted">Switch: ${allocation.switch.poe.toFixed(1)}W · Gateway: ${allocation.gateway.poe.toFixed(1)}W</span>
            </div>
            <p class="text-xs text-nexus-muted mb-4">Ordnen Sie jedem Gerät seine PoE-Quelle zu. Sowohl Switch als auch Gateway liefern Strom.</p>
            <div class="flex flex-col gap-2">
              ${allDevices.map(d => `
                <div class="flex items-center justify-between gap-3 py-1 border-b border-nexus-border last:border-b-0">
                  <div class="text-sm min-w-0 flex-1">
                    <span class="font-medium">${d.displayName}</span>
                    <span class="text-nexus-muted ml-2">(${d.watts}W)</span>
                  </div>
                  <div class="inline-flex rounded-md overflow-hidden border border-nexus-border shrink-0">
                    ${btn('switch', d.source === 'switch', d.id)}
                    ${btn('gateway', d.source === 'gateway', d.id)}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
      };

      container.innerHTML = `
        <h2 class="mb-2">3. Switch & PoE Planung</h2>
        <div id="poe-warning-container">${renderPoeWarning()}</div>
        <div class="card p-6">
          <label class="block text-sm font-bold mb-2">Switch auswählen</label>
          <select id="switch-select" class="w-full bg-nexus-surface border border-nexus-border rounded-lg px-4 py-3 focus:outline-none focus:border-nexus-primary">
            ${switches.map(s => {
              const isRec = s.slug === recSwitch.slug || s.name === recSwitch.name;
              const budgetTxt = (s.budget || 0) > 0 ? `${s.budget}W` : 'kein PoE';
              return `<option value="${s.slug}" ${s.slug === activeSwitch.slug ? 'selected' : ''}>${s.name} – ${s.ports} Ports, ${budgetTxt}${isRec ? ' ✦ Empfohlen' : ''}</option>`;
            }).join('')}
          </select>
        </div>
        ${renderAssignmentCard()}
        <div id="switch-card-container">${renderSwitchCard(activeSwitch)}</div>
        <div id="gateway-poe-container">${renderGatewayPoeCard(gatewaySpec)}</div>
      `;
      contentDiv.appendChild(container);

      container.querySelector('#switch-select').addEventListener('change', (e) => {
        state.selectedSwitch = e.target.value;
        saveState();
        render();
      });

      container.querySelectorAll('.poe-assign-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const src = btn.getAttribute('data-src');
          if(!id || (src !== 'switch' && src !== 'gateway')) return;
          if(!state.poeAssignments) state.poeAssignments = {};
          state.poeAssignments[id] = src;
          saveState();
          render();
        });
      });
    }

    // --- View-Toggles --- //
    window.toggleHeatmap = () => {
      if(!state.view) state.view = { heatmap: false };
      state.view.heatmap = !state.view.heatmap;
      render();
    };

    // --- STEP 4: Features & VLAN-Designer --- //
    window.updateFeature = (id, val) => state.features[id] = val;

    window.setBackupEnabled = (flag) => {
      state.backup.enabled = !!flag;
      if(state.backup.enabled && !state.backup.type) state.backup.type = 'cellular';
      render();
    };
    window.setBackupType = (type) => {
      state.backup.type = type;
      if(type === 'isp2'     && !state.backup.isp2)            state.backup.isp2 = ispList[0];
      if(type === 'cellular' && !state.backup.cellularModel)   state.backup.cellularModel = CELLULAR_PRODUCTS[0].id;
      if(type === 'starlink' && !state.backup.starlinkAntenna) state.backup.starlinkAntenna = STARLINK_ANTENNAS.find(a => a.id === 'standard')?.id || STARLINK_ANTENNAS[0].id;
      if(type === 'starlink' && !state.backup.starlinkPlan)    state.backup.starlinkPlan = STARLINK_PLANS.find(p => p.id === 'res-200')?.id || STARLINK_PLANS[0].id;
      render();
    };
    window.setBackupCellular = (id) => {
      state.backup.cellularModel = id;
      render();
    };
    window.setStarlinkAntenna = (id) => {
      state.backup.starlinkAntenna = id;
      render();
    };
    window.setStarlinkPlan = (id) => {
      state.backup.starlinkPlan = id;
      render();
    };
    window.setBackupIsp = (id) => {
      state.backup.isp2 = ispList.find(i => i.id === id) || null;
      render();
    };
    window.setBackupSpeed = (field, val) => {
      const n = parseInt(val) || 0;
      state.backup[field] = Math.max(0, n);
      saveState();
    };
    window.setBackupMode = (mode) => {
      state.backup.mode = mode;
      saveState();
    };

    const VLAN_PRESETS = {
      haus: [
        { id: 1,  name: 'Management', subnet: '192.168.1.0/24',  purpose: 'mgmt',   ssid: null },
        { id: 10, name: 'Haupt',      subnet: '192.168.10.0/24', purpose: 'main',   ssid: 'HomeNet' },
        { id: 20, name: 'Gast',       subnet: '192.168.20.0/24', purpose: 'guest',  ssid: 'HomeNet-Guest' },
        { id: 30, name: 'IoT',        subnet: '192.168.30.0/24', purpose: 'iot',    ssid: 'HomeNet-IoT' },
        { id: 40, name: 'Kameras',    subnet: '192.168.40.0/24', purpose: 'camera', ssid: null }
      ],
      buero: [
        { id: 1,   name: 'Management', subnet: '10.0.1.0/24',   purpose: 'mgmt',   ssid: null },
        { id: 10,  name: 'Mitarbeiter',subnet: '10.0.10.0/24',  purpose: 'main',   ssid: 'Office-Staff' },
        { id: 20,  name: 'Gast',       subnet: '10.0.20.0/24',  purpose: 'guest',  ssid: 'Office-Guest' },
        { id: 30,  name: 'VoIP',       subnet: '10.0.30.0/24',  purpose: 'voip',   ssid: null },
        { id: 40,  name: 'Kameras',    subnet: '10.0.40.0/24',  purpose: 'camera', ssid: null },
        { id: 50,  name: 'Server',     subnet: '10.0.50.0/24',  purpose: 'server', ssid: null }
      ],
      ferien: [
        { id: 1,  name: 'Management', subnet: '192.168.1.0/24',  purpose: 'mgmt',  ssid: null },
        { id: 10, name: 'Gäste',      subnet: '192.168.10.0/24', purpose: 'guest', ssid: 'Ferienhaus-WLAN' }
      ]
    };

    window.applyVlanPreset = (key) => {
      if(!VLAN_PRESETS[key]) return;
      state.vlans = JSON.parse(JSON.stringify(VLAN_PRESETS[key]));
      render();
    };
    window.addVlan = () => {
      const existing = new Set(state.vlans.map(v => v.id));
      let nextId = 50; while(existing.has(nextId) && nextId < 4095) nextId += 10;
      state.vlans.push({ id: nextId, name: 'Neues VLAN', subnet: `192.168.${nextId}.0/24`, purpose: 'custom', ssid: null });
      render();
    };
    window.removeVlan = (idx) => { state.vlans.splice(idx, 1); render(); };
    window.updateVlan = (idx, field, value) => {
      if(!state.vlans[idx]) return;
      if(field === 'id') value = Math.max(1, Math.min(4094, parseInt(value) || 1));
      if(field === 'ssid' && value === '') value = null;
      state.vlans[idx][field] = value;
      saveState();
    };

    function renderStep4() {
      const container = document.createElement('div');
      container.className = 'fade-in flex flex-col gap-6';

      const tc = (id, title, desc, icon, active) => `
        <div class="card p-5 flex items-center justify-between cursor-pointer card-hover" onclick="document.getElementById('${id}').click()">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg bg-nexus-surface flex items-center justify-center text-nexus-primary"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
            <div><h3 class="font-bold text-base">${title}</h3><p class="text-sm text-nexus-muted">${desc}</p></div>
          </div>
          <div class="relative inline-block w-12 align-middle select-none h-6"><input type="checkbox" id="${id}" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" ${active ? 'checked' : ''} onclick="event.stopPropagation();updateFeature('${id}', this.checked)"/><label for="${id}" class="toggle-label block overflow-hidden h-6 rounded-full bg-nexus-border cursor-pointer transition-colors duration-200"></label></div>
        </div>`;

      const purposes = ['mgmt','main','guest','iot','camera','voip','server','custom'];
      const purposeOpts = (cur) => purposes.map(p => `<option value="${p}" ${p===cur?'selected':''}>${p}</option>`).join('');

      // Validierung
      const warnings = [];
      const ids = new Set(), subs = new Set();
      state.vlans.forEach(v => {
        if(v.id < 1 || v.id > 4094) warnings.push(`VLAN-ID ${v.id} ungültig (1–4094).`);
        if(ids.has(v.id)) warnings.push(`VLAN-ID ${v.id} ist doppelt vergeben.`);
        ids.add(v.id);
        if(subs.has(v.subnet)) warnings.push(`Subnetz ${v.subnet} ist doppelt vergeben.`);
        subs.add(v.subnet);
      });
      const hasCameras = state.floors.some(f => (f.cameras || []).length > 0);
      if(hasCameras && !state.vlans.some(v => v.purpose === 'camera')) {

      container.innerHTML = `

        ${warnHtml}

        <h3 class="font-bold mt-2">Weitere Funktionen</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    // --- STEP 5: Backup-/Zweit-Internet --- //
    function renderStep5() {

      // Mobilfunk-Produktliste: statisches Fallback (mit DE-Beschreibung) + Live-

          const livePrice = getLivePrice(p.id);
          const base = live
            ? { ...p, name: live.name || p.name, image: live.image || p.image, band: live.band || p.band, outdoor: live.outdoor ?? p.outdoor, integratedGateway: live.integratedGateway ?? p.integratedGateway }
            : { ...p };
          base.price = livePrice ?? p.price;
          return base;
        });
        // Live-Produkte, die nicht in der Fallback-Liste sind, anhängen. Preis nur aus Store.
        (productCache.cellular || []).forEach(lp => {
          if(!merged.some(m => m.id === lp.slug)) {
            const livePrice = getLivePrice(lp.slug);
            merged.push({
              id: lp.slug, name: lp.name, image: lp.image || null, band: lp.band || 'Mobilfunk',

      const cellularImg = (p) => {

          : `<div class="w-20 h-20 rounded bg-nexus-surface border border-nexus-border flex items-center justify-center shrink-0"><i data-lucide="signal" class="w-8 h-8 text-nexus-muted"></i></div>`;
      };

      const cellularBlock = bu.enabled && bu.type === 'cellular' ? `
        <div class="card p-4 bg-nexus-surface bg-opacity-50 flex flex-col gap-3">

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            ${cellularList.map(p => `
              <label class="card p-3 cursor-pointer flex gap-3 ${bu.cellularModel === p.id ? 'border-nexus-primary border-2' : ''}">

                    <div class="font-bold text-sm leading-snug">${p.name}</div>
                    <div class="flex gap-1 flex-shrink-0">
                      ${p.outdoor ? '<span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded">Outdoor</span>' : ''}

                    </div>
                  </div>
                  <div class="text-xs text-nexus-muted">${p.band}${p.price != null ? ` · <strong class="text-nexus-text">${p.price} €</strong>` : ''}</div>
                  <p class="text-xs text-nexus-muted mt-1">${p.note}</p>
                </div>
              </label>`).join('')}
          </div>
          <p class="text-[11px] text-nexus-muted">Produktliste und Bilder kommen aus <code>techspecs.ui.com/unifi/integrations</code>. SIM-Karte und Mobilfunktarif separat. Outdoor-Modelle benötigen Mast-/Wandhalterung und ggf. Blitzschutz.</p>
        </div>` : '';

      const starlinkBlock = bu.enabled && bu.type === 'starlink' ? `
        <div class="card p-4 bg-nexus-surface bg-opacity-50 flex flex-col gap-4">
          <div>
            <label class="text-xs font-bold uppercase tracking-wide text-nexus-muted block mb-2">Kompatible Starlink-Antenne</label>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              ${STARLINK_ANTENNAS.map(a => `
                <label class="card p-3 cursor-pointer flex flex-col gap-1 ${bu.starlinkAntenna === a.id ? 'border-nexus-primary border-2' : ''}">
                  <input type="radio" name="bu-sl-ant" value="${a.id}" ${bu.starlinkAntenna === a.id ? 'checked' : ''} onchange="window.setStarlinkAntenna('${a.id}')" class="sr-only">
                  <div class="font-bold text-sm">${a.name}</div>
