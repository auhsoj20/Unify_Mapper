      renderPoeChart('poeChartSwitch',  b.activeSwitch.budget || 0, b.poeAllocation.switch.apCounts,  b.poeAllocation.switch.camCounts,  b.poeAllocation.switch.poe);
      renderPoeChart('poeChartGateway', b.gatewayBudget || 0,       b.poeAllocation.gateway.apCounts, b.poeAllocation.gateway.camCounts, b.poeAllocation.gateway.poe);
    }

    // --- STEP RACK VIEW --- //
    function rackGenId(prefix) { return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
    function rackToast(msg, ms = 2600) {
      const existing = document.querySelector('.rack-toast');
      if(existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'rack-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), ms);
    }
    function getActiveRack() {
      if(!state.racks.length) return null;
      return state.racks.find(r => r.id === state.rackView.activeRackId) || state.racks[0];
    }
    function ensureDefaultRack() {
      if(!state.racks.length) {
        state.racks = [{ id: 'r-main', name: 'Hauptrack', heightU: 12, depthMm: 450, items: [] }];
        state.rackView.activeRackId = 'r-main';
      }
    }
    function rackItemByKindSlug(rack, kind, slug) {
      return (rack.items || []).find(it => it.kind === kind && (slug == null || it.slug === slug)) || null;
    }
    function findFreeSlot(rack, uSize, preferTop = true) {
      const occupied = new Array(rack.heightU + 1).fill(false);
      (rack.items || []).forEach(it => {
        for(let u = it.uStart; u < it.uStart + it.uSize; u++) if(u <= rack.heightU) occupied[u] = true;
      });
      const tryFrom = (from, to, step) => {
        for(let s = from; (step > 0 ? s <= to : s >= to); s += step) {
          let ok = true;
          for(let u = s; u < s + uSize; u++) { if(u > rack.heightU || occupied[u]) { ok = false; break; } }
          if(ok) return s;
        }
        return null;
      };
      if(preferTop) return tryFrom(rack.heightU - uSize + 1, 1, -1);
      return tryFrom(1, rack.heightU - uSize + 1, 1);
    }
    function autoPopulateRack(rack, b) {
      if(!rack || rack.items.length > 0) return;
      const add = (slug, kind, label) => {
        const meta = getRackUnits(slug, kind);
        if(!meta || meta.u === 0) return null;
        const uStart = findFreeSlot(rack, meta.u, true);
        if(uStart == null) return null;
        const it = { id: rackGenId('ri'), slug: slug || null, kind, uStart, uSize: meta.u, label: label || null, ports: null };
        rack.items.push(it);
        return it;
      };
      // Reihenfolge (top → bottom): Kabelführung, Patchpanel, Switch, Gateway, NVR, leere HE, PDU, USV (USV würde unten landen — autoPlace nimmt aber leider oben).
      // Wir platzieren bewusst von oben nach unten in logischer Reihenfolge.
      // Cable-Tray + Patchpanel oben
      add(null, 'cableTray', 'Kabelführung 1U');
      // Patchpanel, wenn im BOM vorhanden
      const hasPatchpanel = (b?.bom || []).some(x => x.slug === 'acc-patch-24' || (x.category === 'Zubehör' && /patchpanel/i.test(x.name)));
      if(hasPatchpanel) add(null, 'patchpanel', 'Patchpanel 24-Port');
      // Switch
      if(b?.activeSwitch?.slug) add(b.activeSwitch.slug, 'switch', b.activeSwitch.name);
      // Gateway (nur wenn rackfähig)
      if(b?.gw?.slug) {
        const gwMeta = getRackUnits(b.gw.slug, 'gateway');
        if(gwMeta.u > 0) add(b.gw.slug, 'gateway', b.gw.name);
      }
      // NVR
      if((b?.allCameras?.length || 0) > 0) {
        const nvrSlug = b.allCameras.length > 10 ? 'unvr-pro' : 'unvr';
        const spec = productCache.specs[nvrSlug];
        add(nvrSlug, 'nvr', spec?.name || 'UniFi NVR');
      }
      // PDU
      add(null, 'pdu', 'PDU 1U');
    }
    function autoRouteCabling(b) {
      const rack = getActiveRack();
      if(!rack) return;
      const switchItem = rackItemByKindSlug(rack, 'switch');
      const gatewayItem = rackItemByKindSlug(rack, 'gateway');
      if(!switchItem && !gatewayItem) return;
      const existingByDev = new Map(state.cabling.connections.map(cn => [cn.deviceId, cn]));
      const used = new Map(); // rackItemId → Set(ports)
      const markUsed = (rid, p) => {
        if(!used.has(rid)) used.set(rid, new Set());
        used.get(rid).add(p);
      };
      // Uplink auf Port 1 jedes Switches reservieren
      if(switchItem) markUsed(switchItem.id, 1);
      // Behalte bereits manuell gesetzte Verbindungen
      state.cabling.connections.forEach(cn => {
        if(cn.portNumber != null) markUsed(cn.rackItemId, cn.portNumber);
      });
      const switchSpec = switchItem ? productCache.specs[switchItem.slug] : null;
      const gatewaySpec = gatewayItem ? productCache.specs[gatewayItem.slug] : null;
      const maxSwitchPorts = switchSpec?.ports || 0;
      const maxGatewayPorts = gatewaySpec?.ports || 0;
      const defaultLen = state.cabling.defaultLengthPerFloorM || 15;
      const defaultCat = state.cabling.defaultCategory || 'cat6a';
      const assignOne = (devId, kind, floorIdx) => {
        const prev = existingByDev.get(devId);
        if(prev && !prev.autoRouted) return; // manuell belassen
        const assigned = state.poeAssignments?.[devId];
        let targetItem = null;
        if(assigned === 'gateway' && gatewayItem) targetItem = gatewayItem;
        else if(assigned === 'switch' && switchItem) targetItem = switchItem;
        else targetItem = switchItem || gatewayItem;
        if(!targetItem) return;
        const maxPorts = targetItem === switchItem ? maxSwitchPorts : maxGatewayPorts;
        // Freien Port suchen (ab 2, Port 1 ist Uplink)
        const set = used.get(targetItem.id) || new Set();
        let port = null;
        for(let p = 2; p <= (maxPorts || 48); p++) {
          if(!set.has(p)) { port = p; break; }
        }
        const cn = {
          id: prev?.id || rackGenId('cn'),
          deviceKind: kind,
          deviceId: devId,
          rackItemId: targetItem.id,
          portNumber: port,
          cableLengthM: prev?.cableLengthM ?? defaultLen * (floorIdx + 1),
          cableCategory: prev?.cableCategory ?? defaultCat,
          autoRouted: true
        };
        if(port != null) markUsed(targetItem.id, port);
        if(prev) {
          Object.assign(prev, cn);
        } else {
          state.cabling.connections.push(cn);
        }
      };
      state.floors.forEach((f, fi) => {
        (f.aps || []).forEach(ap => assignOne(ap.id, 'ap', fi));
        (f.cameras || []).forEach(c => assignOne(c.id, 'camera', fi));
      });
    }

    // Rack-BOM-Zubehör: Kabelmeter, Patchkabel, Blindblenden, Wand-Rack
    function computeRackBomAddons() {
      const rack = getActiveRack();
      const out = [];
      if(!rack || !state.cabling) return out;
      const conns = state.cabling.connections || [];
      const totalM = conns.reduce((s, cn) => s + (parseFloat(cn.cableLengthM) || 0), 0);
      const metersRounded = Math.ceil(totalM / 5) * 5;
      if(metersRounded > 0) {
        const cat = state.cabling.defaultCategory || 'cat6a';
        out.push({ category: 'Zubehör', name: `${cat.toUpperCase()} Verlegekabel (Meter)`, slug: 'acc-cable-' + cat, qty: metersRounded, price: 1 });
      }
      const hasPatchpanel = (rack.items || []).some(it => it.kind === 'patchpanel');
      const patchMultiplier = hasPatchpanel ? 2 : 1;
      if(conns.length > 0) {
        out.push({ category: 'Zubehör', name: 'Cat6a Patchkabel 0,5 m', slug: 'acc-patch-cable', qty: conns.length * patchMultiplier, price: 3 });
      }
      const usedU = (rack.items || []).reduce((s, it) => s + (it.uSize || 0), 0);
      const emptyU = Math.max(0, rack.heightU - usedU);
      if(emptyU > 0) out.push({ category: 'Zubehör', name: 'Blindblende 1U', slug: 'acc-blank-1u', qty: emptyU, price: 4 });
      out.push({ category: 'Zubehör', name: `19" Wand-Rack ${rack.heightU}HE`, slug: 'acc-rack-' + rack.heightU + 'u', qty: 1, price: rack.heightU * 15 + 50 });
      return out;
    }

    function renderRackOverlay() {
      const ov = document.getElementById('rack-overlay');
      if(!ov) return;
      if(!state.rackViewOpen) { ov.classList.add('hidden'); ov.innerHTML = ''; return; }
      // Cleanup verwaiste Verbindungen
      const pruned = pruneOrphanConnections();
      if(pruned > 0) setTimeout(() => rackToast(`${pruned} Kabelzuordnung${pruned===1?'':'en'} verwaist und entfernt`), 50);
      ensureDefaultRack();
      const rack = getActiveRack();
      const b = buildBom();
      // Auto-Populate beim Erst-Öffnen
      if(rack && rack.items.length === 0) {
        autoPopulateRack(rack, b);
        autoRouteCabling(b);
      }

      ov.classList.remove('hidden');
      const faqCollapsed = !!state.rackView.faqCollapsed;
      const multipleRacks = state.racks.length > 1;
      const rackSelector = multipleRacks ? `
        <select onchange="window.rackSelect(this.value)" class="bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-sm">
          ${state.racks.map(r => `<option value="${r.id}" ${r.id===rack.id?'selected':''}>${escapeHtml(r.name)}</option>`).join('')}
        </select>
        <button onclick="window.rackRemoveRack('${rack.id}')" class="btn-secondary text-xs" title="Aktives Rack löschen"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
      ` : '';
      ov.innerHTML = `
        <div class="rack-overlay-header">
          <span class="rack-title"><i data-lucide="server" class="w-5 h-5"></i> Rack-Ansicht</span>
          ${rackSelector}
          <button onclick="window.rackRename('${rack.id}')" class="btn-secondary text-xs" title="Aktives Rack umbenennen"><i data-lucide="pencil" class="w-3 h-3"></i></button>
          <label class="text-xs text-nexus-muted flex items-center gap-1">Höhe
            <select onchange="window.rackSetHeight(this.value)" class="bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-sm">
              ${[6,9,12,15,18,22,26,32,42].map(n => `<option value="${n}" ${n===rack.heightU?'selected':''}>${n}U</option>`).join('')}
            </select>
          </label>
          <label class="text-xs text-nexus-muted flex items-center gap-1">Tiefe
            <select onchange="window.rackSetDepth(this.value)" class="bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-sm">
              ${[300,450,600,800,1000].map(d => `<option value="${d}" ${d===rack.depthMm?'selected':''}>${d} mm</option>`).join('')}
            </select>
          </label>
          <button onclick="window.rackAddRack()" class="btn-secondary text-xs" title="Weiteres Rack anlegen"><i data-lucide="plus" class="w-3 h-3"></i> Rack</button>
          <button onclick="window.rackAutoFill()" class="btn-secondary text-xs" title="Rack und Verkabelung neu aufbauen"><i data-lucide="wand-2" class="w-3 h-3"></i> Auto-Füllen</button>
          <button onclick="window.rackResetLayout()" class="btn-secondary text-xs" title="Alle Items aus dem Rack entfernen"><i data-lucide="eraser" class="w-3 h-3"></i> Leeren</button>
          <button onclick="window.closeRackView()" class="btn-secondary text-xs" title="Schließen"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div class="rack-overlay-body${faqCollapsed?' faq-collapsed':''}">
          <div class="rack-col" id="rack-col-canvas">${renderRackCanvas(rack, b)}</div>
          <div class="rack-col" id="rack-col-middle">${renderRackPaletteAndCabling(rack, b)}</div>
          <div class="rack-col rack-faq-panel${faqCollapsed?' collapsed':''}" id="rack-col-faq">${renderFaqPanel()}</div>
        </div>
      `;
      lucide.createIcons();
      wireRackDnD(rack);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderRackCanvas(rack, b) {
      const usedU = (rack.items || []).reduce((s, it) => s + (it.uSize || 0), 0);
      const emptyU = Math.max(0, rack.heightU - usedU);
      const slots = [];
      for(let u = rack.heightU; u >= 1; u--) {
        slots.push(`<div class="rack-slot${u%2===0?' even':''}" data-u="${u}"><span class="rack-he-label">${u}U</span></div>`);
      }
      const items = (rack.items || []).map(it => {
        const meta = getRackUnits(it.slug, it.kind);
        const widthBadge = meta.width === 'half' ? '<span class="ri-badge">½</span>' : '';
        const portsBadge = it.kind === 'switch' && productCache.specs[it.slug]?.ports
          ? `<span class="ri-badge">${productCache.specs[it.slug].ports}P</span>`
          : (it.kind === 'patchpanel' && it.ports
              ? `<span class="ri-badge ri-badge-clickable" onclick="event.stopPropagation(); window.rackSetPatchpanelPorts('${it.id}')" title="Port-Anzahl ändern" style="cursor:pointer;">${it.ports}P</span>`
              : '');
        const topPx = (rack.heightU - it.uStart - it.uSize + 1) * 26;
        const hPx = it.uSize * 26 - 2;
        const label = it.label || productCache.specs[it.slug]?.name || (it.kind[0].toUpperCase() + it.kind.slice(1));
        return `<div class="rack-item" data-kind="${it.kind}" data-item-id="${it.id}" style="top:${topPx}px; height:${hPx}px; touch-action: none;" title="${escapeHtml(label)} · ${it.uSize}U · ziehen zum Verschieben">
          <span class="ri-name">${escapeHtml(label)}</span>
          ${portsBadge}${widthBadge}
          <span class="ri-remove" onclick="event.stopPropagation(); window.rackRemoveItem('${it.id}')" title="Aus Rack entfernen">✕</span>
        </div>`;
      }).join('');
      const frameH = rack.heightU * 26;
      return `
        <div class="rack-frame-wrap">
          <div class="text-sm text-nexus-muted mb-2">${escapeHtml(rack.name)} · ${rack.heightU}U · ${usedU}U belegt · ${emptyU}U frei</div>
          <div class="rack-frame" style="padding-left: 36px;">
            <div class="rack-slot-track" id="rack-slot-track" style="height:${frameH}px; position:relative;">
              ${slots.join('')}
              ${items}
            </div>
          </div>
        </div>
      `;
    }

    function renderRackPaletteAndCabling(rack, b) {
      // Palette: aus BOM kommende Rack-Kandidaten, die noch nicht im aktiven Rack liegen
      const inRackSlugs = new Set((rack.items || []).filter(it => it.slug).map(it => it.slug));
      const inRackKinds = new Set((rack.items || []).map(it => it.kind));
      const candidates = [];
      if(b?.gw?.slug && !inRackSlugs.has(b.gw.slug)) candidates.push({ slug: b.gw.slug, kind: 'gateway', name: b.gw.name });
      if(b?.activeSwitch?.slug && !inRackSlugs.has(b.activeSwitch.slug)) candidates.push({ slug: b.activeSwitch.slug, kind: 'switch', name: b.activeSwitch.name });
      if((b?.allCameras?.length || 0) > 0) {
        const nvrSlug = b.allCameras.length > 10 ? 'unvr-pro' : 'unvr';
        if(!inRackSlugs.has(nvrSlug)) candidates.push({ slug: nvrSlug, kind: 'nvr', name: productCache.specs[nvrSlug]?.name || 'UniFi NVR' });
      }
      // Generische Rack-Items
      const generics = [
        { slug: null, kind: 'patchpanel', name: 'Patchpanel 24-Port' },
        { slug: null, kind: 'pdu', name: 'PDU 1U' },
        { slug: null, kind: 'ups', name: 'USV 2U' },
        { slug: null, kind: 'cableTray', name: 'Kabelführung 1U' },
        { slug: null, kind: 'shelf', name: 'Fachboden 1U' },
        { slug: null, kind: 'blank', name: 'Blindblende 1U' }
      ];
      const paletteCards = [...candidates, ...generics].map(c => {
        const meta = getRackUnits(c.slug, c.kind);
        const disabled = meta.u === 0;
        return `<div class="rack-palette-card${disabled?' disabled':''}"
            ${disabled ? '' : `draggable="true" data-palette-slug="${c.slug || ''}" data-palette-kind="${c.kind}" data-palette-name="${escapeHtml(c.name)}"`}
            ${disabled ? `title="${meta.note || 'nicht rackfähig'}"` : `onclick="window.rackPlaceItem('${c.slug || ''}','${c.kind}','${escapeHtml(c.name)}')"`}
          >
          <span class="pc-u">${meta.u === 0 ? '—' : meta.u + 'U'}</span>
          <span class="pc-name">${escapeHtml(c.name)}</span>
          ${meta.width === 'half' ? '<span class="pc-u">½</span>' : ''}
        </div>`;
      }).join('');

      // Eigene (benutzerdefinierte) Palette-Items
      const customItems = state.rackView.customPalette || [];
      const customCards = customItems.map(c => `
        <div class="rack-palette-card"
            draggable="true" data-palette-slug="" data-palette-kind="custom" data-palette-name="${escapeHtml(c.name)}" data-palette-u="${c.u}"
            onclick="window.rackPlaceCustomPaletteItem('${c.id}')">
          <span class="pc-u">${c.u}U</span>
          <span class="pc-name">${escapeHtml(c.name)}</span>
          <span class="pc-remove" onclick="event.stopPropagation(); window.rackRemoveCustomPaletteItem('${c.id}')" title="Aus Palette entfernen">✕</span>
        </div>`).join('');

      // Cabling-Tabelle
      const switchItem = rackItemByKindSlug(rack, 'switch');
      const gatewayItem = rackItemByKindSlug(rack, 'gateway');
      const targets = (rack.items || []).filter(it => it.kind === 'switch' || it.kind === 'gateway');
      const switchSpec = switchItem ? productCache.specs[switchItem.slug] : null;
      const gatewaySpec = gatewayItem ? productCache.specs[gatewayItem.slug] : null;
      const portMax = (rid) => {
        const it = (rack.items || []).find(x => x.id === rid);
        if(!it) return 48;
        if(it.kind === 'switch') return productCache.specs[it.slug]?.ports || 48;
        if(it.kind === 'gateway') return productCache.specs[it.slug]?.ports || 8;
        return 48;
      };

      const allDevices = [];
      state.floors.forEach((f, fi) => {
        (f.aps || []).forEach(ap => allDevices.push({ id: ap.id, kind: 'ap', slug: ap.slug, floor: f.name, floorIdx: fi }));
        (f.cameras || []).forEach(c => allDevices.push({ id: c.id, kind: 'camera', slug: c.slug, floor: f.name, floorIdx: fi }));
      });

      // Port-Kollisionen ermitteln
      const portKey = cn => cn.rackItemId + '#' + cn.portNumber;
      const portCounts = new Map();
      state.cabling.connections.forEach(cn => {
        if(cn.portNumber != null) portCounts.set(portKey(cn), (portCounts.get(portKey(cn)) || 0) + 1);
      });

      const cablingRows = allDevices.map(dev => {
        const cn = state.cabling.connections.find(c => c.deviceId === dev.id);
        const spec = productCache.specs[dev.slug];
        const devName = spec?.name || dev.slug;
        const isOrphan = cn && !targets.some(t => t.id === cn.rackItemId);
        const max = cn ? portMax(cn.rackItemId) : (switchSpec?.ports || 8);
        const collision = cn && cn.portNumber != null && (portCounts.get(portKey(cn)) || 0) > 1;
        const targetOpts = targets.map(t => `<option value="${t.id}" ${cn?.rackItemId===t.id?'selected':''}>${escapeHtml(t.label || productCache.specs[t.slug]?.name || t.kind)}</option>`).join('');
        const catOpts = ['cat6','cat6a','cat7'].map(c => `<option value="${c}" ${cn?.cableCategory===c?'selected':''}>${c.toUpperCase()}</option>`).join('');
        const connId = cn?.id || '';
        return `<tr class="${isOrphan||collision?'orphan':''}">
          <td title="${escapeHtml(devName)} (${dev.floor})">
            <div class="flex items-center gap-1">
              <i data-lucide="${dev.kind==='ap'?'wifi':'camera'}" class="w-3 h-3"></i>
              <span class="truncate">${escapeHtml(devName)}</span>
            </div>
            <div class="text-xs text-nexus-muted">${escapeHtml(dev.floor)}</div>
          </td>
          <td>${cn
            ? `<select onchange="window.rackCableAssign('${dev.id}','${dev.kind}',this.value,document.getElementById('port-${dev.id}').value)">${targetOpts}</select>`
            : (targets.length === 0 ? '<span class="text-xs text-nexus-muted">Kein Ziel</span>'
               : `<button class="btn-secondary text-xs" onclick="window.rackCableAssign('${dev.id}','${dev.kind}','${targets[0].id}',null)">Zuweisen</button>`)}
          </td>
          <td>${cn
            ? `<input id="port-${dev.id}" type="number" min="1" max="${max}" value="${cn.portNumber ?? ''}" placeholder="—"
                  onchange="window.rackCableSetPort('${connId}',this.value)"
                  title="${collision?'Port doppelt belegt':isOrphan?'Ziel existiert nicht mehr':'Port '+(cn.portNumber||'?')+'/'+max}">`
            : ''}</td>
          <td>${cn
            ? `<input type="number" min="1" max="100" step="1" value="${cn.cableLengthM}" onchange="window.rackCableSetLength('${connId}',this.value)">`
            : ''}</td>
          <td>${cn ? `<select onchange="window.rackCableSetCategory('${connId}',this.value)">${catOpts}</select>` : ''}</td>
          <td>${cn ? `<button class="text-nexus-muted hover:text-red-500" onclick="window.rackCableRemove('${connId}')" title="Zuordnung entfernen"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}</td>
        </tr>`;
      }).join('');

      // Banner: Switch-Wechsel erkannt?
      const bannerSwitch = (() => {
        if(!b?.activeSwitch?.slug) return '';
        const sw = rackItemByKindSlug(rack, 'switch');
        if(!sw) return `<div class="rack-banner info"><i data-lucide="info" class="w-4 h-4"></i><div>Kein Switch im Rack. <button class="underline" onclick="window.rackPlaceItem('${b.activeSwitch.slug}','switch','${escapeHtml(b.activeSwitch.name)}')">${escapeHtml(b.activeSwitch.name)} einfügen</button></div></div>`;
        if(sw.slug !== b.activeSwitch.slug) return `<div class="rack-banner warn"><i data-lucide="alert-triangle" class="w-4 h-4"></i><div>Switch in Step 3 wurde gewechselt (neu: <strong>${escapeHtml(b.activeSwitch.name)}</strong>, im Rack: <strong>${escapeHtml(productCache.specs[sw.slug]?.name || sw.slug)}</strong>). <button class="underline" onclick="window.rackSwapSwitchItem('${sw.id}','${b.activeSwitch.slug}','${escapeHtml(b.activeSwitch.name)}')">Ersetzen</button></div></div>`;
        return '';
      })();

      // Port-Knappheit
      const bannerPorts = (() => {
        if(!switchItem || !switchSpec?.ports) return '';
        const ass = state.cabling.connections.filter(cn => cn.rackItemId === switchItem.id);
        const needed = ass.length + 1; // +Uplink
        if(needed > switchSpec.ports) return `<div class="rack-banner err"><i data-lucide="alert-octagon" class="w-4 h-4"></i><div>Switch hat zu wenig Ports (${needed} nötig, ${switchSpec.ports} vorhanden). Größeren Switch in Step 3 wählen oder zweiten Switch ergänzen.</div></div>`;
        return '';
      })();

      const totalM = state.cabling.connections.reduce((s, cn) => s + (parseFloat(cn.cableLengthM)||0), 0);
      const rackAddons = computeRackBomAddons();
      const addonsList = rackAddons.map(a => `<div class="flex justify-between"><span>${escapeHtml(a.name)}</span><span class="text-nexus-muted">${a.qty} × ${a.price} € = <strong>${a.qty*a.price} €</strong></span></div>`).join('');

      return `
        <h3><i data-lucide="package" class="w-4 h-4"></i> Geräte-Palette</h3>
        <p class="text-xs text-nexus-muted mb-2">Klick oder Drag auf das Rack, um einzufügen.</p>
        <div class="flex flex-col gap-1 mb-2">${paletteCards}${customCards}</div>
        <button class="btn-secondary text-xs mb-4" onclick="window.rackAddCustomPaletteItem()"><i data-lucide="plus" class="w-3 h-3"></i> Eigenes Item hinzufügen</button>

        <h3><i data-lucide="cable" class="w-4 h-4"></i> Verkabelung</h3>
        ${bannerSwitch}${bannerPorts}
        ${allDevices.length === 0
          ? '<p class="text-sm text-nexus-muted">Noch keine APs oder Kameras platziert — zurück zu Schritt 2.</p>'
          : `<div style="overflow-x:auto;"><table class="rack-cabling-table">
              <thead><tr><th>Gerät</th><th>Ziel</th><th>Port</th><th>Länge (m)</th><th>Kat.</th><th></th></tr></thead>
              <tbody>${cablingRows}</tbody>
            </table></div>
            <div class="mt-2 flex gap-2">
              <button class="btn-secondary text-xs" onclick="window.rackAutoCable()"><i data-lucide="zap" class="w-3 h-3"></i> Auto-Verkabeln</button>
              <span class="text-xs text-nexus-muted self-center">Kabel-Gesamt: <strong>${totalM} m</strong></span>
            </div>`}

        ${rackAddons.length > 0 ? `
          <h3 class="mt-6"><i data-lucide="shopping-bag" class="w-4 h-4"></i> Rack-Zubehör (fließt ins BOM)</h3>
          <div class="text-sm card p-3 flex flex-col gap-1">${addonsList}</div>
        ` : ''}
      `;
    }

    function renderFaqPanel() {
      const collapsed = !!state.rackView.faqCollapsed;
      const toggleIcon = collapsed ? 'chevron-left' : 'chevron-right';
      if(collapsed) {
        return `<div class="rack-faq-head">
          <button class="faq-toggle" onclick="window.rackToggleFaq()" title="FAQ öffnen"><i data-lucide="${toggleIcon}" class="w-4 h-4"></i></button>
        </div>`;
      }
      const items = RACK_FAQ_ITEMS.map((f, i) => `
        <div class="rack-faq-item" id="faq-${f.id}">
          <div class="rack-faq-q" onclick="window.rackFaqToggleItem('${f.id}')">
            <span class="chev">▶</span>
            <span>${escapeHtml(f.q)}</span>
          </div>
          <div class="rack-faq-a">${f.a}</div>
        </div>
      `).join('');
      return `
        <div class="rack-faq-head">
          <h3><i data-lucide="help-circle" class="w-4 h-4"></i> Hilfe &amp; FAQ</h3>
          <button class="faq-toggle" onclick="window.rackToggleFaq()" title="FAQ einklappen"><i data-lucide="${toggleIcon}" class="w-4 h-4"></i></button>
        </div>
        <div class="rack-faq-list">${items}</div>
      `;
    }

    // --- Drag & Drop für Rack (native HTML5) --- //
    let rackDnD = null;
    function wireRackDnD(rack) {
      const track = document.getElementById('rack-slot-track');
      if(!track) return;
      // Palette-Items → Rack
      document.querySelectorAll('#rack-col-middle [data-palette-kind]').forEach(el => {
        el.addEventListener('dragstart', e => {
          const uAttr = el.getAttribute('data-palette-u');
          rackDnD = {
            source: 'palette',
            slug: el.getAttribute('data-palette-slug') || null,
            kind: el.getAttribute('data-palette-kind'),
            name: el.getAttribute('data-palette-name'),
            u: uAttr ? parseInt(uAttr) : null
          };
          e.dataTransfer.effectAllowed = 'copy';
          try { e.dataTransfer.setData('text/plain', rackDnD.kind); } catch(_) {}
        });
        el.addEventListener('dragend', () => { rackDnD = null; clearRackHover(); });
      });
      // Ziel-U aus der Mausposition ableiten (funktioniert auch über besetzten Items)
      const uFromClientY = (clientY, size) => {
        const rect = track.getBoundingClientRect();
        const y = Math.max(0, Math.min(rect.height - 1, clientY - rect.top));
        // Slot-Index 0 oben (= U=heightU), letzter unten (= U=1)
        const slotIdx = Math.floor(y / 26);
        // uStart = unterste HE des Items
        let u = rack.heightU - slotIdx - (size - 1);
        if(u < 1) u = 1;
        if(u + size - 1 > rack.heightU) u = rack.heightU - size + 1;
        return u;
      };

      // Rack-Items → innerhalb Rack verschieben (Pointer-Events, robuster als HTML5-DnD)
      document.querySelectorAll('#rack-slot-track .rack-item').forEach(el => {
        el.setAttribute('draggable', 'false');
        el.addEventListener('pointerdown', e => {
          if(e.button !== 0) return;
          // Klick auf ✕ oder klickbares Badge startet keinen Drag
          if(e.target.closest('.ri-remove')) return;
          if(e.target.closest('.ri-badge-clickable')) return;
          const itemId = el.getAttribute('data-item-id');
          const it = rack.items.find(x => x.id === itemId);
          if(!it) return;
          e.preventDefault();
          rackDnD = { source: 'rack', itemId };
          el.classList.add('dragging');
          try { el.setPointerCapture(e.pointerId); } catch(_) {}
          const uSize = it.uSize;

          const onMove = ev => {
            const u = uFromClientY(ev.clientY, uSize);
            highlightRackRange(u, uSize, rack, itemId);
          };
          const onUp = ev => {
            try { el.releasePointerCapture(e.pointerId); } catch(_) {}
            el.classList.remove('dragging');
            el.removeEventListener('pointermove', onMove);
            el.removeEventListener('pointerup', onUp);
            el.removeEventListener('pointercancel', onUp);
            const finalU = uFromClientY(ev.clientY, uSize);
            rackDnD = null;
            clearRackHover();
            if(finalU !== it.uStart) window.rackMoveItem(itemId, finalU);
          };
          el.addEventListener('pointermove', onMove);
          el.addEventListener('pointerup', onUp);
          el.addEventListener('pointercancel', onUp);
        });
      });

      const paletteSize = () => rackDnD.u != null
        ? rackDnD.u
        : (getRackUnits(rackDnD.slug, rackDnD.kind).u || 1);
      track.addEventListener('dragover', e => {
        if(!rackDnD) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = rackDnD.source === 'palette' ? 'copy' : 'move';
        const size = rackDnD.source === 'palette'
          ? paletteSize()
          : ((rack.items.find(it => it.id === rackDnD.itemId)?.uSize) || 1);
        const u = uFromClientY(e.clientY, size);
        highlightRackRange(u, size, rack, rackDnD.source === 'rack' ? rackDnD.itemId : null);
      });
      track.addEventListener('dragleave', e => {
        if(!e.relatedTarget || !track.contains(e.relatedTarget)) clearRackHover();
      });
      track.addEventListener('drop', e => {
        if(!rackDnD) return;
        e.preventDefault();
        const size = rackDnD.source === 'palette'
          ? paletteSize()
          : ((rack.items.find(it => it.id === rackDnD.itemId)?.uSize) || 1);
        const u = uFromClientY(e.clientY, size);
        if(rackDnD.source === 'palette') {
          window.rackPlaceItemAt(rackDnD.slug, rackDnD.kind, rackDnD.name, u, rackDnD.u);
        } else if(rackDnD.source === 'rack') {
          window.rackMoveItem(rackDnD.itemId, u);
        }
        rackDnD = null;
        clearRackHover();
      });
    }
    function clearRackHover() {
      document.querySelectorAll('#rack-slot-track .rack-slot').forEach(s => s.classList.remove('hover-drop','hover-drop-invalid'));
      document.querySelectorAll('#rack-slot-track .rack-item').forEach(s => s.classList.remove('swap-target'));
    }
    function highlightRackRange(uStart, uSize, rack, ignoreItemId) {
      clearRackHover();
      const occupied = new Array(rack.heightU + 1).fill(false);
      const occupant = new Array(rack.heightU + 1).fill(null);
      (rack.items || []).forEach(it => {
        if(it.id === ignoreItemId) return;
        for(let u = it.uStart; u < it.uStart + it.uSize; u++) if(u <= rack.heightU) { occupied[u] = true; occupant[u] = it; }
      });
      // Kollidierende Items unter dem Zielbereich ermitteln
      const colliders = new Set();
      for(let u = uStart; u < uStart + uSize; u++) {
        if(u >= 1 && u <= rack.heightU && occupant[u]) colliders.add(occupant[u]);
      }
      const colliderArr = Array.from(colliders);
      // Swap ist erlaubt, wenn wir gerade ein Rack-Item ziehen und GENAU ein Gegenstück trifft,
      // das dieselbe Größe hat.
      const draggedItem = ignoreItemId ? (rack.items || []).find(it => it.id === ignoreItemId) : null;
      const canSwap = !!draggedItem && colliderArr.length === 1 && colliderArr[0].uSize === uSize;
      let valid = true;
      for(let u = uStart; u < uStart + uSize; u++) {
        if(u > rack.heightU || u < 1) { valid = false; break; }
        if(occupied[u] && !canSwap) { valid = false; break; }
      }
      const cls = valid ? 'hover-drop' : 'hover-drop-invalid';
      for(let u = uStart; u < uStart + uSize; u++) {
        const s = document.querySelector(`#rack-slot-track .rack-slot[data-u="${u}"]`);
        if(s) s.classList.add(cls);
      }
      if(canSwap && valid) {
        const el = document.querySelector(`#rack-slot-track .rack-item[data-item-id="${colliderArr[0].id}"]`);
        if(el) el.classList.add('swap-target');
      }
    }

    // --- Window-Handler --- //
    window.openRackView = () => { state.rackViewOpen = true; renderRackOverlay(); };
    window.closeRackView = () => { state.rackViewOpen = false; renderRackOverlay(); };
    window.rackSelect = (id) => { state.rackView.activeRackId = id; saveState(); renderRackOverlay(); };
    window.rackAddRack = () => {
      const name = prompt('Name für neues Rack:', `Rack ${state.racks.length + 1}`);
      if(!name) return;
      const id = rackGenId('r');
      state.racks.push({ id, name, heightU: 12, depthMm: 450, items: [] });
      state.rackView.activeRackId = id;
      saveState(); renderRackOverlay();
    };
    window.rackRemoveRack = (id) => {
      if(state.racks.length <= 1) { alert('Mindestens ein Rack muss erhalten bleiben.'); return; }
      const rack = state.racks.find(r => r.id === id);
      if(!rack) return;
      if(rack.items.length > 0 && !confirm(`Rack "${rack.name}" mit ${rack.items.length} Gerät(en) wirklich löschen?`)) return;
      const rackItemIds = new Set((rack.items || []).map(it => it.id));
      state.cabling.connections = state.cabling.connections.filter(cn => !rackItemIds.has(cn.rackItemId));
      state.racks = state.racks.filter(r => r.id !== id);
      state.rackView.activeRackId = state.racks[0]?.id || 'r-main';
      saveState(); renderRackOverlay();
    };
    window.rackRename = (id) => {
      const rack = state.racks.find(r => r.id === id);
      if(!rack) return;
      const name = prompt('Neuer Name für das Rack:', rack.name);
      if(name == null) return;
      const trimmed = name.trim();
      if(!trimmed) return;
      rack.name = trimmed;
      saveState(); renderRackOverlay();
    };
    window.rackSetDepth = (val) => {
      const d = parseInt(val);
      const rack = getActiveRack();
      if(!rack || !Number.isFinite(d) || d <= 0) return;
      rack.depthMm = d;
      saveState(); renderRackOverlay();
    };
    window.rackSetPatchpanelPorts = (itemId) => {
      let target = null;
      for(const rack of state.racks) {
        const it = (rack.items || []).find(x => x.id === itemId);
        if(it) { target = it; break; }
      }
      if(!target || target.kind !== 'patchpanel') return;
      const val = prompt('Port-Anzahl am Patchpanel (12, 24 oder 48):', String(target.ports || 24));
      if(val == null) return;
      const p = parseInt(val);
      if(!Number.isFinite(p) || p <= 0) { rackToast('Ungültige Port-Anzahl'); return; }
      target.ports = p;
      target.label = `Patchpanel ${p}-Port`;
      saveState(); renderRackOverlay();
    };
    window.rackSetHeight = (val) => {
      const newH = parseInt(val);
      const rack = getActiveRack();
      if(!rack || !Number.isFinite(newH)) return;
      const outside = (rack.items || []).filter(it => it.uStart + it.uSize - 1 > newH);
      if(outside.length > 0) {
        const names = outside.map(it => it.label || productCache.specs[it.slug]?.name || it.kind).join(', ');
        if(!confirm(`${outside.length} Item(s) liegen außerhalb ${newH}U und werden entfernt:\n\n${names}\n\nFortfahren?`)) {
          renderRackOverlay(); return;
        }
      }
      const removedIds = new Set(outside.map(it => it.id));
      rack.items = rack.items.filter(it => !removedIds.has(it.id));
      state.cabling.connections = state.cabling.connections.filter(cn => !removedIds.has(cn.rackItemId));
      rack.heightU = newH;
      saveState(); renderRackOverlay();
    };
    window.rackPlaceItem = (slug, kind, name, uOverride) => {
      const rack = getActiveRack();
      if(!rack) return;
      const meta = getRackUnits(slug || null, kind);
      const uSize = uOverride != null ? Math.max(1, parseInt(uOverride)) : meta.u;
      if(uSize === 0) { rackToast(meta.note || 'Nicht rackfähig'); return; }
      const uStart = findFreeSlot(rack, uSize, true);
      if(uStart == null) { rackToast('Kein Platz im Rack — Höhe erhöhen oder Items entfernen.'); return; }
      rack.items.push({ id: rackGenId('ri'), slug: slug || null, kind, uStart, uSize, label: name || null, ports: kind === 'patchpanel' ? 24 : null });
      saveState(); renderRackOverlay();
    };
    window.rackPlaceItemAt = (slug, kind, name, uStart, uOverride) => {
      const rack = getActiveRack();
      if(!rack) return;
      const meta = getRackUnits(slug || null, kind);
      const uSize = uOverride != null ? Math.max(1, parseInt(uOverride)) : meta.u;
      if(uSize === 0) { rackToast(meta.note || 'Nicht rackfähig'); return; }
      // Grenzen prüfen
      if(uStart < 1 || uStart + uSize - 1 > rack.heightU) {
        rackToast('Außerhalb des Racks');
        return;
      }
      // Kollision prüfen
      const occupied = new Array(rack.heightU + 1).fill(false);
      (rack.items || []).forEach(it => { for(let u = it.uStart; u < it.uStart + it.uSize; u++) if(u <= rack.heightU) occupied[u] = true; });
      for(let u = uStart; u < uStart + uSize; u++) {
        if(occupied[u]) { rackToast('Kollision mit bestehendem Item'); return; }
      }
      rack.items.push({ id: rackGenId('ri'), slug: slug || null, kind, uStart, uSize, label: name || null, ports: kind === 'patchpanel' ? 24 : null });
      saveState(); renderRackOverlay();
    };
    window.rackAddCustomPaletteItem = () => {
      const name = prompt('Name für eigenes Palette-Item:');
      if(!name) return;
      const trimmed = name.trim();
      if(!trimmed) return;
      const uStr = prompt('Höhe in HE (1–10):', '1');
      if(uStr == null) return;
      const u = parseInt(uStr);
      if(!Number.isFinite(u) || u < 1 || u > 10) { rackToast('Ungültige Höhe (1–10 HE)'); return; }
      if(!state.rackView.customPalette) state.rackView.customPalette = [];
      state.rackView.customPalette.push({ id: 'cp-' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), name: trimmed, u });
      saveState(); renderRackOverlay();
    };
    window.rackRemoveCustomPaletteItem = (id) => {
      if(!state.rackView.customPalette) return;
      state.rackView.customPalette = state.rackView.customPalette.filter(c => c.id !== id);
      saveState(); renderRackOverlay();
    };
    window.rackPlaceCustomPaletteItem = (id) => {
      const c = (state.rackView.customPalette || []).find(x => x.id === id);
      if(!c) return;
      window.rackPlaceItem('', 'custom', c.name, c.u);
    };
    window.rackMoveItem = (itemId, uStart) => {
      const rack = getActiveRack();
      if(!rack) return;
      const it = rack.items.find(x => x.id === itemId);
      if(!it) return;
      uStart = Math.max(1, Math.min(rack.heightU - it.uSize + 1, parseInt(uStart)));
      if(uStart === it.uStart) return;

      // Kollidierende Items (ohne sich selbst) im Zielbereich sammeln
      const colliders = new Set();
      rack.items.forEach(x => {
        if(x.id === itemId) return;
        for(let u = uStart; u < uStart + it.uSize; u++) {
          if(u >= x.uStart && u < x.uStart + x.uSize) colliders.add(x);
        }
      });
      const colliderArr = Array.from(colliders);

      // Swap, wenn genau ein gleichgroßes Item getroffen wird
      if(colliderArr.length === 1 && colliderArr[0].uSize === it.uSize) {
        const other = colliderArr[0];
        const oldStart = it.uStart;
        it.uStart = other.uStart;
        other.uStart = oldStart;
        saveState(); renderRackOverlay();
        return;
      }

      if(colliderArr.length > 0) {
        const allSameSize = colliderArr.every(c => c.uSize === it.uSize);
        if(colliderArr.length > 1 && allSameSize) {
          rackToast('Swap nur mit einem gleich großen Item möglich');
        } else {
          rackToast('Kollision mit ' + colliderArr.length + ' Item(s)');
        }
        return;
      }
      if(uStart < 1 || uStart + it.uSize - 1 > rack.heightU) { rackToast('Außerhalb des Racks'); return; }
      it.uStart = uStart;
      saveState(); renderRackOverlay();
    };
    window.rackRemoveItem = (itemId) => {
      const rack = getActiveRack();
      if(!rack) return;
      rack.items = rack.items.filter(it => it.id !== itemId);
      // Connections auf dieses Item verwaisen — werden beim nächsten render geprunt
      state.cabling.connections = state.cabling.connections.filter(cn => cn.rackItemId !== itemId);
      saveState(); renderRackOverlay();
    };
    window.rackSwapSwitchItem = (oldItemId, newSlug, newName) => {
      const rack = getActiveRack();
      if(!rack) return;
      const it = rack.items.find(x => x.id === oldItemId);
      if(!it) return;
      it.slug = newSlug;
      it.label = newName;
      // Ports anpassen: bei zu wenigen Ports am neuen Switch portNumber nullen
      const spec = productCache.specs[newSlug];
      const maxPorts = spec?.ports || 0;
      state.cabling.connections.forEach(cn => {
        if(cn.rackItemId === oldItemId && cn.portNumber != null && cn.portNumber > maxPorts) {
          cn.portNumber = null;
        }
      });
      saveState(); renderRackOverlay();
    };
    window.rackToggleFaq = () => { state.rackView.faqCollapsed = !state.rackView.faqCollapsed; saveState(); renderRackOverlay(); };
    window.rackFaqToggleItem = (id) => {
      const el = document.getElementById('faq-' + id);
      if(el) el.classList.toggle('open');
    };
    window.rackCableAssign = (deviceId, deviceKind, rackItemId, portVal) => {
      if(!rackItemId) return;
      const existing = state.cabling.connections.find(c => c.deviceId === deviceId);
      const port = portVal != null && portVal !== '' ? parseInt(portVal) : null;
      if(existing) {
        existing.rackItemId = rackItemId;
        if(port != null) existing.portNumber = port;
        existing.autoRouted = false;
      } else {
        state.cabling.connections.push({
          id: rackGenId('cn'),
          deviceKind, deviceId, rackItemId,
          portNumber: port,
          cableLengthM: state.cabling.defaultLengthPerFloorM || 15,
          cableCategory: state.cabling.defaultCategory || 'cat6a',
          autoRouted: false
        });
      }
      saveState(); renderRackOverlay();
    };
    window.rackCableSetPort = (cnId, val) => {
      const cn = state.cabling.connections.find(c => c.id === cnId);
      if(!cn) return;
      const p = parseInt(val);
      if(!Number.isFinite(p) || p <= 0) {
        cn.portNumber = null;
      } else {
        let maxPorts = 0;
        for(const rack of state.racks) {
          const item = (rack.items || []).find(it => it.id === cn.rackItemId);
          if(item) {
            if(item.kind === 'switch') maxPorts = productCache.specs[item.slug]?.ports || 0;
            else if(item.kind === 'patchpanel') maxPorts = item.ports || 0;
            break;
          }
        }
        if(maxPorts > 0 && p > maxPorts) {
          cn.portNumber = maxPorts;
          rackToast(`Port ${p} > ${maxPorts} verfügbar — auf ${maxPorts} korrigiert`);
        } else {
          cn.portNumber = p;
        }
      }
      cn.autoRouted = false;
      saveState(); renderRackOverlay();
    };
    window.rackCableSetLength = (cnId, val) => {
      const cn = state.cabling.connections.find(c => c.id === cnId);
      if(!cn) return;
      const m = parseFloat(val);
      cn.cableLengthM = Number.isFinite(m) && m > 0 ? m : (state.cabling.defaultLengthPerFloorM || 15);
      cn.autoRouted = false;
      saveState(); renderRackOverlay();
    };
    window.rackCableSetCategory = (cnId, val) => {
      const cn = state.cabling.connections.find(c => c.id === cnId);
      if(!cn) return;
      cn.cableCategory = val;
      cn.autoRouted = false;
      saveState(); renderRackOverlay();
    };
    window.rackCableRemove = (cnId) => {
      state.cabling.connections = state.cabling.connections.filter(c => c.id !== cnId);
      saveState(); renderRackOverlay();
    };
    window.rackAutoCable = () => {
      const b = buildBom();
      autoRouteCabling(b);
      saveState(); renderRackOverlay();
      rackToast('Verkabelung automatisch neu zugewiesen');
    };
    window.rackAutoFill = () => {
      const rack = getActiveRack();
      if(!rack) return;
      if(rack.items.length > 0 && !confirm('Aktuelles Layout überschreiben?')) return;
      rack.items = [];
      state.cabling.connections = [];
      const b = buildBom();
      autoPopulateRack(rack, b);
      autoRouteCabling(b);
      saveState(); renderRackOverlay();
      rackToast('Rack automatisch befüllt');
    };
    window.rackResetLayout = () => {
      const rack = getActiveRack();
      if(!rack) return;
      if(rack.items.length === 0) return;
      if(!confirm(`Alle ${rack.items.length} Item(s) aus dem Rack entfernen? Zugehörige Kabelzuordnungen werden mit entfernt.`)) return;
      const rackItemIds = new Set((rack.items || []).map(it => it.id));
      state.cabling.connections = state.cabling.connections.filter(cn => !rackItemIds.has(cn.rackItemId));
      rack.items = [];
      saveState(); renderRackOverlay();
    };

    // --- Init / Boot --- //
    document.getElementById('btn-prev').addEventListener('click', () => {
      if(state.currentStep > 1) {
        state.currentStep--;
        render();
      }
    });
    
    document.getElementById('progress-container').addEventListener('click', (e) => {
        if(e.target.classList.contains('step-node')) {
            const trgStep = parseInt(e.target.getAttribute('data-step'));
            if(trgStep < state.currentStep) {
                state.currentStep = trgStep;
                render();
            }
        }
    });

    // BOOTSTRAP
    lucide.createIcons();
    initializeApp(); 

  </script>
</body>
</html>
