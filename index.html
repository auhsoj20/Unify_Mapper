                  <p class="text-xs text-nexus-muted mt-1">${a.note}</p>
                </label>`).join('')}
            </div>
          </div>
          <div>
            <label class="text-xs font-bold uppercase tracking-wide text-nexus-muted block mb-2">Tarif</label>
            <div class="overflow-hidden rounded border border-nexus-border">
              <table class="w-full text-xs">
                <thead class="bg-nexus-surface text-nexus-muted uppercase text-[10px]">
                  <tr><th class="px-3 py-2 text-left w-8"></th><th class="px-3 py-2 text-left">Tarif</th><th class="px-3 py-2 text-right">€/Monat</th><th class="px-3 py-2 text-left">Datenvolumen</th><th class="px-3 py-2 text-left">Hinweis</th></tr>
                </thead>
                <tbody>
                  ${STARLINK_PLAN_CATEGORIES.map(cat => {
                    const rows = STARLINK_PLANS.filter(p => p.category === cat.id);
                    if(!rows.length) return '';
                    return `
                    <tr class="bg-nexus-surface bg-opacity-60">
                      <td colspan="5" class="px-3 py-2 text-[10px] uppercase tracking-wide font-bold text-nexus-primary">
                        ${cat.label} <span class="font-normal normal-case text-nexus-muted">— ${cat.sub}</span>
                      </td>
                    </tr>
                    ${rows.map(p => `
                      <tr class="border-t border-nexus-border ${bu.starlinkPlan === p.id ? 'bg-nexus-primary bg-opacity-10' : ''}">
                        <td class="px-3 py-2"><input type="radio" name="bu-sl-plan" value="${p.id}" ${bu.starlinkPlan === p.id ? 'checked' : ''} onchange="window.setStarlinkPlan('${p.id}')"></td>
                        <td class="px-3 py-2 font-semibold">${p.name}</td>
                        <td class="px-3 py-2 text-right font-mono">${p.monthly} €</td>
                        <td class="px-3 py-2">${p.data}</td>
                        <td class="px-3 py-2 text-nexus-muted">${p.note}</td>
                      </tr>`).join('')}`;
                  }).join('')}
                </tbody>
              </table>
            </div>
            <p class="text-[11px] text-nexus-muted mt-2">Quelle: <code>starlink.com/de/service-plans</code> (Stand 2026-04). Tarif-Auswahl ist rein informativ und fließt nicht in die BOM ein.</p>
          </div>
        </div>` : '';

      // Empfehlungskarte: was landet in der BOM / was wird vorausgesetzt
      let recoHtml = '';
      if(bu.enabled) {
        if(bu.type === 'starlink') {
          const ant = STARLINK_ANTENNAS.find(a => a.id === bu.starlinkAntenna) || STARLINK_ANTENNAS[1];
          const plan = STARLINK_PLANS.find(p => p.id === bu.starlinkPlan);
          recoHtml = `<div class="flex gap-3 items-start"><div class="bg-nexus-primary text-white p-2 rounded-lg"><i data-lucide="satellite" class="w-5 h-5"></i></div>
            <div><div class="font-bold">${ant.name} · ${ant.price} € UVP</div>
            <p class="text-xs text-nexus-muted mt-1">Anschluss per Ethernet an den WAN2-Port des Gateways. Ethernet-Adapter ggf. nicht im Lieferumfang.</p>
            ${plan ? `<p class="text-xs text-nexus-muted mt-1">Tarif: <strong class="text-nexus-text">${plan.name}</strong> – ${plan.monthly} €/Monat.</p>` : ''}
            </div></div>`;
        } else if(bu.type === 'cellular') {
          const cm = CELLULAR_PRODUCTS.find(p => p.id === bu.cellularModel) || CELLULAR_PRODUCTS[0];
          const cmPrice = getLivePrice(cm.id) ?? cm.price;
          const priceTxt = cm.integratedGateway ? 'im Gateway enthalten' : `${cmPrice} €`;
          recoHtml = `<div class="flex gap-3 items-start"><div class="bg-nexus-primary text-white p-2 rounded-lg"><i data-lucide="signal" class="w-5 h-5"></i></div>
            <div><div class="font-bold">${cm.name} · ${priceTxt}</div>
            <p class="text-xs text-nexus-muted mt-1">${cm.note}</p>
            ${cm.integratedGateway && gwCurrent.slug !== cm.id ? `<p class="text-xs text-red-600 mt-2 font-semibold">⚠ Aktuelles Gateway <strong>${gwCurrent.name}</strong> hat kein integriertes 5G-Modem. In Schritt 1 „${cm.name}" wählen, sonst wird ein separates Modem nötig.</p>` : ''}
            </div></div>`;
        } else if(bu.type === 'isp2') {
          const modemPrice = bu.isp2?.modemPrice || 0;
          recoHtml = `<div class="flex gap-3 items-start"><div class="bg-nexus-primary text-white p-2 rounded-lg"><i data-lucide="router" class="w-5 h-5"></i></div>
            <div><div class="font-bold">${bu.isp2 ? (bu.isp2.modemRec + (modemPrice > 0 ? ` · ${modemPrice} €` : ' · im Tarif enthalten')) : 'Zweiten Anbieter wählen'}</div>
            <p class="text-xs text-nexus-muted mt-1">${bu.isp2?.notes || 'Der zweite kabelgebundene Anschluss wird als WAN2 ins Gateway geführt.'}</p></div></div>`;
        }
      }

      const dualWanWarn = bu.enabled && !gwIsDualWan ? `
        <div class="card p-4 border-l-4 border-yellow-500 bg-yellow-50">
          <div class="font-bold text-yellow-800 mb-1 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Gateway ohne zweites WAN</div>
          <p class="text-sm text-yellow-900">Das aktuelle Gateway <strong>${gwCurrent.name}</strong> hat keinen zweiten WAN-Uplink. Wähle in Schritt 1 ein Dual-WAN-fähiges Modell, z. B. UDM Pro, UCG Max, Cloud Gateway Fiber.</p>
        </div>` : '';

      container.innerHTML = `
        <h2 class="mb-2">5. Backup- / Zweit-Internet</h2>

        <div class="card p-5">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h3 class="font-bold flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4 text-nexus-primary"></i> Backup- / Zweit-Internet</h3>
              <p class="text-xs text-nexus-muted mt-1">Automatischer Failover oder Load-Balancing bei Ausfall des Hauptanschlusses.</p>
            </div>
            <div class="relative inline-block w-12 align-middle select-none h-6">
              <input type="checkbox" id="bu-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" ${bu.enabled ? 'checked' : ''} onchange="window.setBackupEnabled(this.checked)">
              <label for="bu-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-nexus-border cursor-pointer transition-colors duration-200"></label>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            ${backupTypeCard('cellular', 'signal', 'Mobilfunk (LTE / 5G)', 'UniFi-Mobilfunk-Lösung wie UMR, U-LTE-Pro oder UDR 5G Max. Auswahl unten.')}
            ${backupTypeCard('isp2', 'router', 'Zweiter kabelgebundener ISP', 'Zweite DSL/Kabel/Glasfaser-Leitung. Modemempfehlung wird automatisch vorgeschlagen.')}
            ${backupTypeCard('starlink', 'satellite', 'Starlink / Satellit', 'Standort ohne stabilen Zweitanschluss. Dishy per Ethernet ans Gateway.')}
          </div>

          ${isp2Block}
          ${cellularBlock}
          ${starlinkBlock}

          ${bu.enabled && bu.type ? `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
              <div class="card p-3 bg-nexus-surface bg-opacity-50">
                <label class="text-xs font-bold uppercase tracking-wide text-nexus-muted block mb-2">Betriebsmodus</label>
                <select onchange="window.setBackupMode(this.value)" class="w-full bg-nexus-surface border border-nexus-border rounded px-3 py-2 text-sm">
                  <option value="failover" ${bu.mode === 'failover' ? 'selected' : ''}>Failover (Backup schaltet nur bei Ausfall)</option>
                  <option value="loadbalance" ${bu.mode === 'loadbalance' ? 'selected' : ''}>Load-Balancing (parallel nutzen)</option>
                </select>
              </div>
              <div class="card p-3 bg-nexus-surface bg-opacity-50">
                <label class="text-xs font-bold uppercase tracking-wide text-nexus-muted block mb-2">Empfehlung</label>
                ${recoHtml || '<p class="text-xs text-nexus-muted">Wähle einen Backup-Typ.</p>'}
              </div>
            </div>` : ''}
        </div>

        ${dualWanWarn}
      `;
      contentDiv.appendChild(container);
    }

    // --- STEP 6: Dashboard --- //
    // --- BOM Overrides: Window-Handler --- //
    const BOM_CUSTOM_CATEGORIES = ['Gateway','Modem','Switch','Access Point','Kamera','NVR','Backup-Modem','Backup-Uplink','Zubehör','Sonstiges'];

    window.removeBomRow = (key) => {
      if(!state.bomOverrides) state.bomOverrides = { removedKeys: [], customRows: [], quantityOverrides: {} };
      if(key.startsWith('custom:')) {
        const id = key.slice('custom:'.length);
        state.bomOverrides.customRows = state.bomOverrides.customRows.filter(r => r.id !== id);
      } else {
        if(!state.bomOverrides.removedKeys.includes(key)) state.bomOverrides.removedKeys.push(key);
        // Falls für diesen Key eine Mengen-Override existiert, aufräumen
        if(state.bomOverrides.quantityOverrides) delete state.bomOverrides.quantityOverrides[key];
      }
      render();
    };

    window.setBomQuantity = (key, val) => {
      if(!state.bomOverrides) state.bomOverrides = { removedKeys: [], customRows: [], quantityOverrides: {} };
      const n = Math.max(0, parseInt(val) || 0);
      if(key.startsWith('custom:')) {
        const id = key.slice('custom:'.length);
        const row = state.bomOverrides.customRows.find(r => r.id === id);
        if(row) row.qty = n;
      } else {
        state.bomOverrides.quantityOverrides[key] = n;
      }
      render();
    };

    window.updateCustomBomRow = (id, field, value) => {
      if(!state.bomOverrides) return;
      const row = state.bomOverrides.customRows.find(r => r.id === id);
      if(!row) return;
      if(field === 'qty' || field === 'price') {
        row[field] = Math.max(0, parseInt(value) || 0);
      } else {
        row[field] = value;
      }
      render();
    };

    window.addCustomBomRow = () => {
      if(!state.bomOverrides) state.bomOverrides = { removedKeys: [], customRows: [], quantityOverrides: {} };
      const form = document.getElementById('bom-add-form');
      if(!form) return;
      const category = form.querySelector('[name=cat]')?.value || 'Sonstiges';
      const catalogSlug = form.querySelector('[name=catalog]')?.value || '';
      let name = form.querySelector('[name=name]')?.value?.trim() || '';
      let price = parseInt(form.querySelector('[name=price]')?.value) || 0;
      const qty = Math.max(1, parseInt(form.querySelector('[name=qty]')?.value) || 1);

      // Katalogeintrag hat Vorrang: übernimmt Name + Preis falls gesetzt
      if(catalogSlug && productCache.specs[catalogSlug]) {
        const p = productCache.specs[catalogSlug];
        name = p.name || name;
        if(!price) price = p.price || 0;
      }
      if(!name) { alert('Bitte Modell-/Artikelname angeben.'); return; }

      const id = 'c' + Date.now() + Math.floor(Math.random() * 1000);
      state.bomOverrides.customRows.push({ id, category, name, slug: catalogSlug || '', qty, price });
      render();
    };

    window.resetBomOverrides = () => {
      if(!confirm('Alle manuellen BOM-Anpassungen zurücksetzen?')) return;
      state.bomOverrides = { removedKeys: [], customRows: [], quantityOverrides: {} };
      render();
    };

    window.bomFormCatalogPick = (selectEl) => {
      const slug = selectEl.value;
      const form = selectEl.form;
      if(!form || !slug) return;
      const p = productCache.specs[slug];
      if(!p) return;
      const nameInput = form.querySelector('[name=name]');
      const priceInput = form.querySelector('[name=price]');
      if(nameInput && !nameInput.value) nameInput.value = p.name || '';
      if(priceInput && (!priceInput.value || priceInput.value === '0')) priceInput.value = p.price || 0;
    };

    window.restoreBomRow = (key) => {
      if(!state.bomOverrides) return;
      state.bomOverrides.removedKeys = state.bomOverrides.removedKeys.filter(k => k !== key);
      render();
    };

    function bomKey(category, slug, name) {
      return `auto:${category}:${slug || name}`;
    }

    function applyBomOverrides(autoBom) {
      const ov = state.bomOverrides || { removedKeys: [], customRows: [], quantityOverrides: {} };
      const removed = new Set(ov.removedKeys || []);
      const qtyOver = ov.quantityOverrides || {};

      const patched = autoBom
        .map(item => {
          const key = bomKey(item.category, item.slug, item.name);
          return { ...item, key, isCustom: false };
        })
        .filter(item => !removed.has(item.key))
        .map(item => {
          if(qtyOver[item.key] != null) {
            const n = parseInt(qtyOver[item.key]);
            if(!isNaN(n) && n >= 0) item.qty = n;
          }
          return item;
        });

      (ov.customRows || []).forEach(row => {
        patched.push({
          key: `custom:${row.id}`,
          category: row.category || 'Sonstiges',
          name: row.name || '(ohne Namen)',
          slug: row.slug || '',
          qty: parseInt(row.qty) || 1,
          price: parseInt(row.price) || 0,
          isCustom: true,
          customId: row.id
        });
      });

      return patched;
    }

    function buildBom() {
      const gw = getGatewayRecommended();
      const allAps = state.floors.flatMap(f => f.aps || []);
      const allCameras = state.floors.flatMap(f => f.cameras || []);

      const totalApPoe = allAps.reduce((sum, ap) => sum + (productCache.specs[ap.slug]?.maxWatts || 15), 0);
      const totalCamPoe = allCameras.reduce((sum, c) => sum + (productCache.specs[c.slug]?.poeWatts || 8), 0);
      const totalPoe = totalApPoe + totalCamPoe;

      const switches = productCache.switching.map(s => productCache.specs[s.slug]).filter(s => s && s.ports);
      switches.sort((a,b) => (a.budget || 0) - (b.budget || 0));
      const portsNeeded = allAps.length + allCameras.length + 1; // +1 Uplink
      let recSwitch = switches.find(s => (s.budget || 0) >= (totalPoe * 1.2) && s.ports >= portsNeeded) || switches[switches.length-1];
      if(!recSwitch) recSwitch = { name: 'Generic PoE Switch', budget: 150, price: 199, ports: 8 };
      const activeSwitch = (state.selectedSwitch && switches.find(s => s.slug === state.selectedSwitch)) || recSwitch;

      const autoBom = [];
      autoBom.push({ category: 'Gateway', name: gw.name, slug: gw.slug || '', qty: 1, price: gw.price || 150 });
      if(state.isp?.modemPrice > 0) autoBom.push({ category: 'Modem', name: state.isp.modemRec, slug: '', qty: 1, price: state.isp.modemPrice });

      // Backup-Internet-Hardware
      if(state.backup?.enabled) {
        if(state.backup.type === 'isp2' && state.backup.isp2?.modemPrice > 0) {
          autoBom.push({ category: 'Backup-Modem', name: state.backup.isp2.modemRec, slug: '', qty: 1, price: state.backup.isp2.modemPrice });
        } else if(state.backup.type === 'starlink') {
          const ant = STARLINK_ANTENNAS.find(a => a.id === state.backup.starlinkAntenna) || STARLINK_ANTENNAS[1];
          autoBom.push({ category: 'Backup-Uplink', name: ant.name, slug: `starlink-${ant.id}`, qty: 1, price: ant.price });
        } else if(state.backup.type === 'cellular') {
          const cm = CELLULAR_PRODUCTS.find(p => p.id === state.backup.cellularModel);
          // Wenn das Cellular-Produkt selbst das Gateway ist (z. B. UDR 5G Max) und als Gateway
          // gewählt wurde, dann kein zusätzlicher BOM-Eintrag. Sonst: als Zusatz-Hardware auflisten.
          if(cm && !(cm.integratedGateway && gw.slug === cm.id)) {
            autoBom.push({ category: 'Backup-Uplink', name: cm.name, slug: cm.id, qty: 1, price: getLivePrice(cm.id) ?? cm.price });
          }
        }
      }

      autoBom.push({ category: 'Switch', name: activeSwitch.name, slug: activeSwitch.slug || '', qty: 1, price: activeSwitch.price || 199 });

      const apCounts = {};
      allAps.forEach(ap => apCounts[ap.slug] = (apCounts[ap.slug] || 0) + 1);
      Object.keys(apCounts).forEach(slug => {
        const p = productCache.specs[slug];
        autoBom.push({ category: 'Access Point', name: p?.name || slug, slug, qty: apCounts[slug], price: p?.price || 179 });
      });

      const camCounts = {};
      allCameras.forEach(c => camCounts[c.slug] = (camCounts[c.slug] || 0) + 1);
      Object.keys(camCounts).forEach(slug => {
        const p = productCache.specs[slug];
        autoBom.push({ category: 'Kamera', name: p?.name || slug, slug, qty: camCounts[slug], price: p?.price || 199 });
      });

      // NVR-Empfehlung
      if(allCameras.length > 0) {
        const nvrSlug = allCameras.length > 10 ? 'unvr-pro' : 'unvr';
        const nvr = productCache.specs[nvrSlug] || { name: allCameras.length > 10 ? 'UniFi NVR Pro' : 'UniFi NVR', price: allCameras.length > 10 ? 799 : 399 };
        autoBom.push({ category: 'NVR', name: nvr.name, slug: nvrSlug, qty: 1, price: nvr.price });
      }

      // Zubehör-Empfehlungen
      const mountPrice = 25;
      if(allAps.length > 0) autoBom.push({ category: 'Zubehör', name: 'AP-Deckenmount (Standard)', slug: 'acc-mount-ceiling', qty: allAps.length, price: mountPrice });
      if(allCameras.length > 0) autoBom.push({ category: 'Zubehör', name: 'Kamera-Wandmount', slug: 'acc-mount-cam', qty: allCameras.length, price: mountPrice });
      const totalDevices = 1 + (state.isp?.modemPrice > 0 ? 1 : 0) + 1 + allAps.length + allCameras.length + (allCameras.length > 0 ? 1 : 0);

      // Rack-Addons aus Rack-Ansicht (Kabelmeter, Patchkabel, Blindblenden, dynamisches Rack)
      let rackAddons = [];
      try { if (typeof computeRackBomAddons === 'function') rackAddons = computeRackBomAddons() || []; } catch(e) {}
      const rackAddonSlugs = new Set(rackAddons.map(a => a.slug));
      const rackViewUsed = rackAddons.length > 0;

      if(totalDevices >= 3) {
        // Nur Fallback, wenn Rack-View kein dynamisches Rack liefert
        if(!rackViewUsed || !Array.from(rackAddonSlugs).some(s => s.startsWith('acc-rack-'))) {
          autoBom.push({ category: 'Zubehör', name: '19" Wand-Rack 6HE', slug: 'acc-rack-6u', qty: 1, price: 149 });
        }
        // Patchpanel-Fallback: falls Rack-View nicht genutzt oder kein Patchpanel im Rack
        const hasRackPatchpanel = (state.racks || []).some(r => (r.items || []).some(it => it.kind === 'patchpanel'));
        if(!rackViewUsed || !hasRackPatchpanel) {
          autoBom.push({ category: 'Zubehör', name: 'Patchpanel 24-Port Cat6a', slug: 'acc-patch-24', qty: 1, price: 59 });
        }
      }

      // Rack-Addons anhängen (Kabel/Patch/Blindblenden + ggf. dynamisches Rack)
      rackAddons.forEach(a => autoBom.push(a));

      const bom = applyBomOverrides(autoBom);

      const gwSpec = productCache.specs[gw.slug] || null;
      const gatewayBudget = gwSpec?.budget || 0;
      const gatewayHasPoe = gatewayBudget > 0;
      const switchHasPoe = !!activeSwitch && activeSwitch.poe !== false && (activeSwitch.budget || 0) > 0;
      const poeAllocation = computePoeAllocation(allAps, allCameras, switchHasPoe, gatewayHasPoe);

      return { gw, gwSpec, gatewayBudget, gatewayHasPoe, switchHasPoe, poeAllocation, allAps, allCameras, totalApPoe, totalCamPoe, totalPoe, recSwitch, activeSwitch, bom, autoBom, apCounts, camCounts };
    }

    function computePower(b) {
      // Grundlasten (Watt, Idle ohne PoE-Abgabe)
      const gatewayIdle = b.gw.idleWatts || (b.gw.slug?.includes('enterprise') || b.gw.slug?.includes('max') ? 30 : 15);
      const switchIdle = b.activeSwitch.idleWatts || (b.activeSwitch.ports >= 24 ? 25 : b.activeSwitch.ports >= 16 ? 18 : 12);
      const nvrIdle = b.allCameras.length > 0 ? (b.allCameras.length > 10 ? 30 : 15) : 0;
      const deliveredPoe = b.totalPoe;
      const totalWatts = gatewayIdle + switchIdle + nvrIdle + deliveredPoe;
      const kwhYear = totalWatts * 24 * 365 / 1000;
      const upsVA = Math.ceil(totalWatts * 1.5 / 10) * 10; // gerundet auf 10 VA
      return { gatewayIdle, switchIdle, nvrIdle, deliveredPoe, totalWatts, kwhYear, upsVA };
    }

    window.exportProjectJson = () => {
      const payload = { _meta: { app: 'unifi-setup-planner', version: 1, exportedAt: new Date().toISOString() }, state };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,10);
      a.href = url; a.download = `unifi-projekt-${stamp}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    window.importProjectJson = () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'application/json,.json';
      inp.onchange = (e) => {
        const file = e.target.files?.[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const obj = JSON.parse(reader.result);
            const loaded = obj.state || obj;
            if(!loaded || !Array.isArray(loaded.floors)) throw new Error('Ungültige Projektdatei (floors fehlt).');
            loaded.floors = loaded.floors.map(f => ({ cameras: [], ...f }));
            if(!loaded.view) loaded.view = { heatmap: false };
            if(!Array.isArray(loaded.vlans)) loaded.vlans = [];
            loaded.backup = normalizeBackupState(loaded.backup);
            loaded.bomOverrides = normalizeBomOverrides(loaded.bomOverrides);
            loaded.racks = normalizeRacksState(loaded.racks);
            loaded.cabling = normalizeCablingState(loaded.cabling);
            loaded.rackView = normalizeRackView(loaded.rackView, loaded.racks);
            loaded.rackViewOpen = false;
            Object.assign(state, loaded);
            render();
            alert('Projekt erfolgreich geladen.');
          } catch(err) {
            alert('Fehler beim Laden: ' + err.message);
          }
        };
        reader.readAsText(file, 'utf-8');
      };
      inp.click();
    };

    window.exportBomCsv = () => {
      const b = buildBom();
      const rows = [['Kategorie','Modell','Slug','Menge','Einzelpreis (EUR)','Gesamtpreis (EUR)']];
      b.bom.forEach(it => rows.push([it.category, it.name, it.slug || '', String(it.qty), String(it.price), String(it.price * it.qty)]));
      const total = b.bom.reduce((s,it) => s + it.price * it.qty, 0);
      rows.push(['','','','', 'Gesamt:', String(total)]);
      const esc = (v) => /[;"\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
      const csv = '\uFEFF' + rows.map(r => r.map(esc).join(';')).join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,10);
      a.href = url; a.download = `unifi-bom-${stamp}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    function renderStep6() {
      const b = buildBom();
      const p = computePower(b);
      const sumTotal = b.bom.reduce((acc, r) => acc + (r.price * r.qty), 0);

      const container = document.createElement('div');
      container.className = 'fade-in flex flex-col gap-8';

      const vlanCard = state.vlans && state.vlans.length > 0 ? `
          <div class="card p-0 overflow-hidden">
             <div class="px-6 py-4 border-b border-nexus-border bg-nexus-surface bg-opacity-50"><h3 class="font-bold">Netzwerk-Segmentierung (VLANs)</h3></div>
             <table class="w-full text-sm text-left">
               <thead class="text-xs text-nexus-muted uppercase bg-nexus-surface">
                 <tr><th class="px-6 py-3">ID</th><th class="px-6 py-3">Name</th><th class="px-6 py-3">Subnetz</th><th class="px-6 py-3">Zweck</th><th class="px-6 py-3">SSID</th></tr>
               </thead>
               <tbody>
                 ${state.vlans.map(v => `<tr class="border-b border-nexus-border"><td class="px-6 py-3 font-mono">${v.id}</td><td class="px-6 py-3 font-medium">${v.name}</td><td class="px-6 py-3 font-mono text-xs">${v.subnet}</td><td class="px-6 py-3">${v.purpose}</td><td class="px-6 py-3">${v.ssid || '—'}</td></tr>`).join('')}
               </tbody>
             </table>
          </div>` : '';

      // Kanal-Kollisionswarnung
      const channelWarnings = [];
      state.floors.forEach(f => {
        const aps = f.aps || [];
        for(let i=0;i<aps.length;i++) for(let j=i+1;j<aps.length;j++) {
          const a=aps[i], c=aps[j];
          const dist = Math.hypot((a.x||0)-(c.x||0), (a.y||0)-(c.y||0));
          if(dist < 8 && a.channel5 && c.channel5 && Math.abs(a.channel5 - c.channel5) <= 4) {
            channelWarnings.push(`${f.name}: APs auf 5 GHz-Kanal ${a.channel5} und ${c.channel5} stehen zu nah (${dist.toFixed(1)}m).`);
          }
        }
      });
      const warnCard = channelWarnings.length > 0 ? `
          <div class="card p-5 border-l-4 border-yellow-500 bg-yellow-50">
             <h3 class="font-bold text-yellow-800 mb-2 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> Kanal-Kollision erkannt</h3>
             <ul class="text-sm text-yellow-900 list-disc pl-5 space-y-1">${channelWarnings.map(w => `<li>${w}</li>`).join('')}</ul>
          </div>` : '';

      container.innerHTML = `
        <div class="print:hidden flex flex-wrap items-center justify-between gap-4">
          <h2 class="mb-0">6. Ergebnis & Zusammenfassung</h2>
          <div class="flex flex-wrap gap-2 no-print">
            <button onclick="window.exportProjectJson()" class="btn-secondary text-xs flex items-center gap-1"><i data-lucide="save" class="w-3 h-3"></i> Projekt speichern (.json)</button>
            <button onclick="window.importProjectJson()" class="btn-secondary text-xs flex items-center gap-1"><i data-lucide="folder-open" class="w-3 h-3"></i> Projekt laden</button>
            <button onclick="window.exportBomCsv()" class="btn-secondary text-xs flex items-center gap-1"><i data-lucide="file-spreadsheet" class="w-3 h-3"></i> BOM als CSV</button>
          </div>
        </div>
        <div id="dash-content" class="grid grid-cols-1 border-t border-nexus-border pt-8 gap-8">

          ${warnCard}

          <div class="card p-6 bg-[#1f2937] text-white">
             <h3 class="text-lg font-bold mb-6 text-gray-200">Netzwerk-Topologie (${b.allAps.length} APs · ${b.allCameras.length} Kameras)</h3>
             <div class="flex flex-col items-center gap-6"><div class="text-nexus-primary font-bold">${b.gw.name}</div></div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card p-5"><div class="text-xs text-nexus-muted uppercase tracking-wide mb-1">Gesamt-Strom</div><div class="text-2xl font-bold">${p.totalWatts.toFixed(0)} W</div><div class="text-xs text-nexus-muted mt-1">Gateway ${p.gatewayIdle} W · Switch ${p.switchIdle} W · PoE ${p.deliveredPoe.toFixed(0)} W${p.nvrIdle ? ' · NVR '+p.nvrIdle+' W' : ''}</div></div>
            <div class="card p-5"><div class="text-xs text-nexus-muted uppercase tracking-wide mb-1">Stromkosten (geschätzt)</div><div class="text-2xl font-bold">${p.kwhYear.toFixed(0)} kWh/Jahr</div><div class="text-xs text-nexus-muted mt-1">≈ ${(p.kwhYear * 0.32).toFixed(0)} € bei 0,32 €/kWh</div></div>
            <div class="card p-5"><div class="text-xs text-nexus-muted uppercase tracking-wide mb-1">USV-Empfehlung</div><div class="text-2xl font-bold">≥ ${p.upsVA} VA</div><div class="text-xs text-nexus-muted mt-1">1,5×-Puffer auf Gesamtlast</div></div>
          </div>

          ${vlanCard}

          <div class="card p-0 overflow-hidden">
             <div class="px-6 py-4 border-b border-nexus-border bg-nexus-surface bg-opacity-50 flex items-center justify-between flex-wrap gap-2">
               <h3 class="font-bold">Stückliste (BOM)</h3>
               <div class="flex items-center gap-3">
                 <span class="text-sm text-nexus-muted">Gesamt: <strong>~${sumTotal} €</strong></span>
                 ${(state.bomOverrides?.removedKeys?.length || state.bomOverrides?.customRows?.length || Object.keys(state.bomOverrides?.quantityOverrides || {}).length) ? `<button onclick="window.resetBomOverrides()" class="btn-secondary text-xs flex items-center gap-1 no-print"><i data-lucide="rotate-ccw" class="w-3 h-3"></i> Auto wiederherstellen</button>` : ''}
               </div>
             </div>
             <table class="w-full text-sm text-left">
               <thead class="text-xs text-nexus-muted uppercase bg-nexus-surface">
                 <tr>
                   <th class="px-6 py-3">Typ</th>
                   <th class="px-6 py-3">Modell</th>
                   <th class="px-4 py-3 text-center">Menge</th>
                   <th class="px-4 py-3 text-right">Einzel</th>
                   <th class="px-4 py-3 text-right">Gesamt</th>
                   <th class="px-4 py-3 text-right no-print"></th>
                 </tr>
               </thead>
               <tbody>
                  ${b.bom.map(item => `<tr class="border-b border-nexus-border ${item.isCustom ? 'bg-nexus-primary bg-opacity-5' : ''}">
                    <td class="px-6 py-3 font-medium">${item.category}${item.isCustom ? ' <span class="ml-1 text-[10px] uppercase tracking-wide bg-nexus-primary text-white px-1.5 py-0.5 rounded">Manuell</span>' : ''}</td>
                    <td class="px-6 py-3">${item.isCustom
                      ? `<input type="text" value="${(item.name || '').replace(/"/g,'&quot;')}" onchange="window.updateCustomBomRow('${item.customId}','name',this.value)" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">`
                      : item.name}</td>
                    <td class="px-4 py-3 text-center">
                      <input type="number" min="0" max="999" value="${item.qty}" onchange="window.setBomQuantity('${item.key}', this.value)" class="w-16 text-center bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                    </td>
                    <td class="px-4 py-3 text-right">${item.isCustom
                      ? `<input type="number" min="0" step="1" value="${item.price}" onchange="window.updateCustomBomRow('${item.customId}','price',this.value)" class="w-20 text-right bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs"> €`
                      : `~${item.price} €`}</td>
                    <td class="px-4 py-3 text-right font-bold">~${item.price * item.qty} €</td>
                    <td class="px-4 py-3 text-right no-print">
                      <button onclick="window.removeBomRow('${item.key}')" class="text-red-500 hover:text-red-700" title="Entfernen"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                  </tr>`).join('')}
                  ${(state.bomOverrides?.removedKeys || []).length > 0 ? `<tr class="border-b border-nexus-border bg-nexus-surface bg-opacity-30 no-print">
                    <td colspan="6" class="px-6 py-3 text-xs text-nexus-muted">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span><i data-lucide="eye-off" class="w-3 h-3 inline"></i> Entfernt:</span>
                        ${state.bomOverrides.removedKeys.map(k => {
                          const parts = k.split(':'); const cat = parts[1]; const id = parts.slice(2).join(':');
                          return `<button onclick="window.restoreBomRow('${k}')" class="underline hover:text-nexus-primary" title="Wiederherstellen">${cat} · ${id}</button>`;
                        }).join(' · ')}
                      </div>
                    </td>
                  </tr>` : ''}
               </tbody>
             </table>
             <div class="px-6 py-4 border-t border-nexus-border bg-nexus-surface bg-opacity-30 no-print">
               <details>
                 <summary class="cursor-pointer text-sm font-bold flex items-center gap-2 select-none"><i data-lucide="plus-circle" class="w-4 h-4 text-nexus-primary"></i> Position hinzufügen</summary>
                 <form id="bom-add-form" onsubmit="event.preventDefault(); window.addCustomBomRow();" class="grid grid-cols-1 md:grid-cols-6 gap-2 mt-3 items-end">
                   <div class="md:col-span-1">
                     <label class="text-xs text-nexus-muted block mb-1">Kategorie</label>
                     <select name="cat" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                       ${BOM_CUSTOM_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}
                     </select>
                   </div>
                   <div class="md:col-span-2">
                     <label class="text-xs text-nexus-muted block mb-1">UniFi-Katalog (optional)</label>
                     <select name="catalog" onchange="window.bomFormCatalogPick(this)" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                       <option value="">— Freitext —</option>
                       ${Object.entries(productCache.specs).filter(([,p]) => p && p.name).map(([slug, p]) => `<option value="${slug}">${p.name}</option>`).join('')}
                     </select>
                   </div>
                   <div class="md:col-span-1">
                     <label class="text-xs text-nexus-muted block mb-1">Modell/Name</label>
                     <input name="name" type="text" placeholder="z. B. USB-C Kabel 2m" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                   </div>
                   <div>
                     <label class="text-xs text-nexus-muted block mb-1">Menge</label>
                     <input name="qty" type="number" min="1" max="999" value="1" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                   </div>
                   <div>
                     <label class="text-xs text-nexus-muted block mb-1">Preis €</label>
                     <input name="price" type="number" min="0" step="1" value="0" class="w-full bg-nexus-surface border border-nexus-border rounded px-2 py-1 text-xs">
                   </div>

             </div>
          </div>

          ${(() => {
            const switchBudget = b.activeSwitch.budget || 0;

            if(b.gatewayHasPoe) {

          })()}

        </div>
      `;
      contentDiv.appendChild(container);

      const renderPoeChart = (canvasId, budget, apCounts, camCounts, usedPoe) => {
        const canvas = document.getElementById(canvasId);
        if(!canvas) return;
        const apLabels = Object.keys(apCounts).map(slug => productCache.specs[slug]?.name || slug);
        const apVals = Object.keys(apCounts).map(slug => (productCache.specs[slug]?.maxWatts || 15) * apCounts[slug]);
        const camLabels = Object.keys(camCounts).map(slug => productCache.specs[slug]?.name || slug);
        const camVals = Object.keys(camCounts).map(slug => (productCache.specs[slug]?.poeWatts || 8) * camCounts[slug]);
        const labels = [...apLabels, ...camLabels, 'Reserve'];
        const dataVals = [...apVals, ...camVals, Math.max(0, budget - usedPoe)];
        const ctx = canvas.getContext('2d');
        new Chart(ctx, {
          type: 'bar',

            labels: ['PoE Allocation'],
            datasets: labels.map((lbl, i) => ({ label: lbl, data: [dataVals[i]], backgroundColor: i === labels.length-1 ? '#e5e7eb' : (i < apLabels.length ? '#01696f' : '#7c3aed'), barThickness: 40 }))
          },
          options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, display: false }, y: { stacked: true, display: false } } }
        });
